name: _validation-lane-release

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      checkout_fetch_depth:
        required: false
        type: number
        default: 1
      summary_title:
        required: true
        type: string
      lane_id:
        required: false
        type: string
        default: ""
      lane_phase:
        required: false
        type: string
        default: downstream_lanes
      status_class:
        required: false
        type: string
        default: active
      frontier_default:
        required: false
        type: boolean
        default: false
      setup_class:
        required: false
        type: string
        default: release
      frontier_role:
        required: false
        type: string
        default: sentinel
      summary_family:
        required: false
        type: string
        default: validation-lane
      cost_class:
        required: false
        type: string
        default: medium
      working_directory:
        required: false
        type: string
        default: .
      script_path:
        required: true
        type: string
      script_args_json:
        required: false
        type: string
        default: "[]"
      needs_just:
        required: false
        type: boolean
        default: false
      needs_node:
        required: false
        type: boolean
        default: false
      needs_nextest:
        required: false
        type: boolean
        default: false
      needs_linux_build_deps:
        required: false
        type: boolean
        default: false
      needs_dotslash:
        required: false
        type: boolean
        default: false
      needs_sccache:
        required: false
        type: boolean
        default: false
      cache_policy:
        required: false
        type: string
        default: restore-only
      artifact_name:
        required: false
        type: string
        default: ""
      artifact_path:
        required: false
        type: string
        default: ""
      release_version:
        required: false
        type: string
        default: ""

permissions:
  contents: read


jobs:
  run:
    name: ${{ inputs.summary_title }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - name: Record lane start
        id: lane_timing
        shell: bash
        run: echo "job_started_at_ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.checkout_fetch_depth }}
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Check out workflow helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}
          path: .workflow-src

      - name: Reclaim runner disk headroom
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail

          soft_threshold_bytes=$((12 * 1024 * 1024 * 1024))
          hard_threshold_bytes=$((6 * 1024 * 1024 * 1024))

          available_bytes() {
            df --block-size=1 --output=avail "$GITHUB_WORKSPACE" | tail -n 1 | tr -d '[:space:]'
          }

          before_bytes="$(available_bytes)"
          if [[ "${before_bytes}" -lt "${soft_threshold_bytes}" ]]; then
            echo "::warning title=Low runner disk before lane setup::Available disk is $(numfmt --to=iec "${before_bytes}") before dependency setup; reclaiming headroom."
            sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
            sudo apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/* || true
          fi

          after_bytes="$(available_bytes)"
          if [[ "${after_bytes}" -lt "${hard_threshold_bytes}" ]]; then
            echo "::error title=Insufficient runner disk::Available disk after cleanup is $(numfmt --to=iec "${after_bytes}"), below the 6 GiB safety floor for validation lanes."
            exit 1
          fi

      - name: Set up Node.js for js_repl tests
        if: ${{ inputs.needs_node }}
        uses: actions/setup-node@v6
        with:
          node-version-file: codex-rs/node-version.txt

      - name: Install Linux build dependencies
        if: ${{ inputs.needs_linux_build_deps }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install DotSlash
        if: ${{ inputs.needs_dotslash }}
        uses: facebook/install-dotslash@v2

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Compute lockfile hash
        id: lockhash
        shell: bash
        run: |
          set -euo pipefail
          echo "hash=$(sha256sum codex-rs/Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$(sha256sum codex-rs/rust-toolchain.toml | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.rusty_v8/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Install sccache
        if: ${{ inputs.needs_sccache }}
        uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        with:
          tool: sccache

      - name: Expose GitHub cache-service env for sccache
        if: ${{ inputs.needs_sccache }}
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure sccache backend
        id: sccache_backend
        if: ${{ inputs.needs_sccache }}
        shell: bash
        run: |
          set -euo pipefail
          policy='${{ inputs.cache_policy }}'
          case "${policy}" in
            off|restore-only|write-fallback) ;;
            *)
              echo "::warning title=Unknown cache policy::${policy}; using restore-only"
              policy="restore-only"
              ;;
          esac
          echo "policy=${policy}" >> "$GITHUB_OUTPUT"
          if [[ "${policy}" == "off" ]]; then
            {
              echo "SCCACHE_GHA_ENABLED=false"
              echo "SCCACHE_DIR=${GITHUB_WORKSPACE}/.sccache"
            } >> "$GITHUB_ENV"
            echo "backend=off" >> "$GITHUB_OUTPUT"
            echo "sccache disabled by cache policy"
            exit 0
          fi
          cache_url="${SCCACHE_GHA_CACHE_URL:-${ACTIONS_RESULTS_URL:-${ACTIONS_CACHE_URL:-}}}"
          if [[ -n "${cache_url}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            {
              echo "ACTIONS_CACHE_SERVICE_V2=on"
              echo "SCCACHE_GHA_ENABLED=true"
              echo "SCCACHE_GHA_CACHE_URL=${cache_url}"
            } >> "$GITHUB_ENV"
            echo "backend=gha" >> "$GITHUB_OUTPUT"
            echo "Using sccache GitHub backend"
          else
            {
              echo "SCCACHE_GHA_ENABLED=false"
              echo "SCCACHE_DIR=${GITHUB_WORKSPACE}/.sccache"
            } >> "$GITHUB_ENV"
            echo "backend=fallback" >> "$GITHUB_OUTPUT"
            echo "Using sccache local disk + actions/cache fallback"
          fi

      - name: Enable sccache wrapper
        if: ${{ inputs.needs_sccache && steps.sccache_backend.outputs.backend != 'off' }}
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ inputs.needs_sccache && steps.sccache_backend.outputs.backend == 'fallback' }}
        id: cache_sccache_restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-${{ github.run_id }}
          restore-keys: |
            sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-
            sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-

      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        if: ${{ inputs.needs_nextest }}
        with:
          tool: nextest
          version: 0.9.103

      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        if: ${{ inputs.needs_just }}
        with:
          tool: just

      - name: Enable unprivileged user namespaces (Linux)
        if: ${{ inputs.needs_nextest }}
        shell: bash
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          if sudo sysctl -a 2>/dev/null | grep -q '^kernel.apparmor_restrict_unprivileged_userns'; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Mark setup complete
        id: setup_complete
        shell: bash
        run: echo "setup_finished_at_ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Run requested lane script
        id: run_lane
        shell: bash
        continue-on-error: true
        env:
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
          SCRIPT_PATH: ${{ inputs.script_path }}
          SCRIPT_ARGS_JSON: ${{ inputs.script_args_json }}
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/validation-lane.log"
          started_at_ms="$(date +%s%3N)"
          export CODEX_RELEASE_REPOSITORY='${{ github.repository }}'
          export CODEX_RELEASE_TAG_PREFIX='v'
          if [[ -n '${{ inputs.release_version }}' ]]; then
            export CODEX_RELEASE_VERSION='${{ inputs.release_version }}'
          fi
          : > "${log_file}"
          attempt=1
          max_attempts=2
          set +e
          while true; do
            if [[ "${attempt}" -gt 1 ]]; then
              printf '\n=== retry attempt %s/%s ===\n' "${attempt}" "${max_attempts}" | tee -a "${log_file}"
            fi
            python3 .workflow-src/.github/scripts/run_validation_lane.py \
              --repo-root "${GITHUB_WORKSPACE}" \
              --working-directory "${WORKING_DIRECTORY}" \
              --script-path "${SCRIPT_PATH}" \
              --script-args-json "${SCRIPT_ARGS_JSON}" 2>&1 | tee -a "${log_file}"
            exit_code=${PIPESTATUS[0]}
            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi
            if [[ "${attempt}" -ge "${max_attempts}" ]]; then
              break
            fi
            if grep -q 'rusty_v8' "${log_file}" && grep -q 'HTTP Error 502' "${log_file}"; then
              echo "::warning title=Retrying flaky rusty_v8 download::${{ inputs.summary_title }} hit HTTP 502 while downloading rusty_v8; retrying once." | tee -a "${log_file}"
              attempt=$((attempt + 1))
              sleep 5
              continue
            fi
            break
          done
          set -e
          finished_at_ms="$(date +%s%3N)"
          duration_ms="$((finished_at_ms - started_at_ms))"
          if [[ "${duration_ms}" -lt 0 ]]; then
            duration_ms=0
          fi
          {
            echo "log_file=${log_file}"
            echo "started_at_ms=${started_at_ms}"
            echo "finished_at_ms=${finished_at_ms}"
            echo "duration_ms=${duration_ms}"
            echo "exit_code=${exit_code}"
          } >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Summarize lane failure output
        if: ${{ steps.run_lane.outcome == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail
          lane='${{ inputs.lane_id != '' && inputs.lane_id || inputs.summary_title }}'
          exit_code='${{ steps.run_lane.outputs.exit_code }}'

          {
            echo "### Downstream lane failed: ${lane}"
            echo
            echo "- Exit code: ${exit_code}"
            echo "- Public summary policy: raw commands and raw log excerpts are omitted."
            echo "- Next step: inspect the job log directly when deeper runner context is required."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error title=Downstream lane failed::${lane} failed (exit ${exit_code}). Public summary omits raw commands and log excerpts; inspect the job log for detailed runner context."

      - name: Verify requested command passed
        if: ${{ steps.run_lane.outcome == 'failure' }}
        shell: bash
        run: exit 1

      - name: Prepare lane summary artifact
        if: ${{ always() }}
        id: lane_summary
        shell: bash
        env:
          SUMMARY_TITLE: ${{ inputs.summary_title }}
          LANE_ID: ${{ inputs.lane_id != '' && inputs.lane_id || inputs.summary_title }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          LANE_PHASE: ${{ inputs.lane_phase }}
          STATUS_CLASS: ${{ inputs.status_class }}
          FRONTIER_DEFAULT: ${{ inputs.frontier_default && 'true' || 'false' }}
          SETUP_CLASS: ${{ inputs.setup_class }}
          FRONTIER_ROLE: ${{ inputs.frontier_role }}
          SUMMARY_FAMILY: ${{ inputs.summary_family }}
          COST_CLASS: ${{ inputs.cost_class }}
          SCRIPT_PATH: ${{ inputs.script_path }}
          SCRIPT_ARGS_JSON: ${{ inputs.script_args_json }}
          RUN_OUTCOME: ${{ steps.run_lane.outcome }}
          EXIT_CODE: ${{ steps.run_lane.outputs.exit_code }}
          LOG_FILE: ${{ steps.run_lane.outputs.log_file }}
          JOB_STARTED_AT_MS: ${{ steps.lane_timing.outputs.job_started_at_ms }}
          SETUP_FINISHED_AT_MS: ${{ steps.setup_complete.outputs.setup_finished_at_ms }}
          STARTED_AT_MS: ${{ steps.run_lane.outputs.started_at_ms }}
          FINISHED_AT_MS: ${{ steps.run_lane.outputs.finished_at_ms }}
          COMMAND_DURATION_MS: ${{ steps.run_lane.outputs.duration_ms }}
          CACHE_POLICY: ${{ inputs.cache_policy }}
          CACHE_BACKEND: ${{ steps.sccache_backend.outputs.backend }}
          SCCACHE_CACHE_HIT: ${{ steps.cache_sccache_restore.outputs.cache-hit }}
        run: |
          set -euo pipefail
          lane_slug="$(printf '%s' "${LANE_ID}" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]' '-' | sed 's/^-//;s/-$//' | cut -c1-48)"
          if [[ -z "${lane_slug}" ]]; then
            lane_slug="validation-lane"
          fi
          summary_file="${RUNNER_TEMP}/validation-lane-summary-${lane_slug}.json"
          setup_duration_ms="$((SETUP_FINISHED_AT_MS - JOB_STARTED_AT_MS))"
          if [[ "${setup_duration_ms}" -lt 0 ]]; then
            setup_duration_ms=0
          fi
          total_duration_ms="$((FINISHED_AT_MS - JOB_STARTED_AT_MS))"
          if [[ "${total_duration_ms}" -lt 0 ]]; then
            total_duration_ms=0
          fi
          cache_backend="${CACHE_BACKEND:-not-applicable}"
          sccache_restore_mode="not-applicable"
          if [[ "${cache_backend}" == "fallback" ]]; then
            if [[ "${SCCACHE_CACHE_HIT}" == "true" ]]; then
              sccache_restore_mode="exact-hit"
            else
              sccache_restore_mode="restore-key-or-miss"
            fi
          fi
          python3 .workflow-src/.github/scripts/write_lane_summary.py \
            --lane-id "${LANE_ID}" \
            --lane-phase "${LANE_PHASE}" \
            --summary-title "${SUMMARY_TITLE}" \
            --script-path "${SCRIPT_PATH}" \
            --script-args-json "${SCRIPT_ARGS_JSON}" \
            --status-class "${STATUS_CLASS}" \
            --frontier-default "${FRONTIER_DEFAULT}" \
            --setup-class "${SETUP_CLASS}" \
            --frontier-role "${FRONTIER_ROLE}" \
            --summary-family "${SUMMARY_FAMILY}" \
            --cost-class "${COST_CLASS}" \
            --outcome "${RUN_OUTCOME}" \
            --exit-code "${EXIT_CODE}" \
            --log-file "${LOG_FILE}" \
            --job-started-at-ms "${JOB_STARTED_AT_MS}" \
            --setup-finished-at-ms "${SETUP_FINISHED_AT_MS}" \
            --started-at-ms "${STARTED_AT_MS}" \
            --finished-at-ms "${FINISHED_AT_MS}" \
            --setup-duration-ms "${setup_duration_ms}" \
            --command-duration-ms "${COMMAND_DURATION_MS}" \
            --duration-ms "${total_duration_ms}" \
            --cache-policy "${CACHE_POLICY}" \
            --cache-backend "${cache_backend}" \
            --sccache-restore-mode "${sccache_restore_mode}" \
            --artifact-name "${ARTIFACT_NAME}" \
            --output "${summary_file}"
          echo "lane_slug=${lane_slug}" >> "$GITHUB_OUTPUT"
          echo "summary_file=${summary_file}" >> "$GITHUB_OUTPUT"

      - name: Upload lane summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-lane-summary-${{ steps.lane_summary.outputs.lane_slug }}
          path: ${{ steps.lane_summary.outputs.summary_file }}
          overwrite: true
          retention-days: 3

      - name: Upload workflow artifacts
        if: ${{ inputs.artifact_name != '' && inputs.artifact_path != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 3

      - name: Check post-lane disk headroom
        if: ${{ always() && !cancelled() && runner.os == 'Linux' }}
        id: disk_guard
        shell: bash
        run: |
          set -euo pipefail
          save_floor_bytes=$((8 * 1024 * 1024 * 1024))
          available_bytes="$(df --block-size=1 --output=avail "$GITHUB_WORKSPACE" | tail -n 1 | tr -d '[:space:]')"
          {
            echo "available_bytes=${available_bytes}"
            if [[ "${available_bytes}" -lt "${save_floor_bytes}" ]]; then
              echo "skip_cache_save=true"
            else
              echo "skip_cache_save=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Save cargo home cache
        if: ${{ always() && !cancelled() && steps.cache_cargo_home_restore.outputs.cache-hit != 'true' && steps.disk_guard.outputs.skip_cache_save != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.rusty_v8/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && inputs.needs_sccache && steps.sccache_backend.outputs.backend == 'fallback' && steps.sccache_backend.outputs.policy == 'write-fallback' && steps.disk_guard.outputs.skip_cache_save != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-${{ github.run_id }}

      - name: sccache stats
        if: ${{ always() && inputs.needs_sccache && steps.sccache_backend.outputs.backend != 'off' }}
        continue-on-error: true
        shell: bash
        run: sccache --show-stats || true
