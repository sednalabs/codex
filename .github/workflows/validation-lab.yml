name: validation-lab
run-name: >-
  validation-lab
  [${{ inputs.profile }}/${{ inputs.lane_set != '' && inputs.lane_set || 'custom' }}]

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
      profile:
        required: true
        type: string
      lane_set:
        required: true
        type: string
      lanes:
        required: false
        type: string
      artifact_build:
        required: false
        type: boolean
        default: false
      include_explicit_lanes:
        required: false
        type: boolean
        default: false
      supersession_mode:
        required: false
        type: string
        default: auto
      supersession_key:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to validate; this value is passed directly to actions/checkout for the validation-target checkout, so SHA pinning belongs in the dispatch/watch layer instead
        required: false
        type: string
      profile:
        description: Validation depth/profile
        required: true
        type: choice
        options:
          - smoke
          - targeted
          - frontier
          - broad
          - full
          - artifact
        default: smoke
      lane_set:
        description: Named downstream lane family
        required: true
        type: choice
        options:
          - all
          - core-carry
          - release
          - subagents
          - startup-sync
          - ledger
          - ui-protocol
          - docs
          - attestation
        default: all
      lanes:
        description: Optional comma-separated explicit lane IDs
        required: false
        type: string
      artifact_build:
        description: Also build and upload a disposable preview artifact
        required: false
        type: boolean
        default: false
      include_explicit_lanes:
        description: Include explicit-only seams in the selected validation set
        required: false
        type: boolean
        default: false
      supersession_mode:
        description: Whether newer same-question runs should supersede this run
        required: true
        type: choice
        options:
          - auto
          - compare
          - milestone
          - retain
        default: auto
      supersession_key:
        description: Optional retention label for compare/milestone/retain runs
        required: false
        type: string

concurrency:
  group: >-
    ${{
      inputs.supersession_mode == 'auto' &&
      format(
        'validation-lab::auto::{0}::{1}::{2}::{3}::{4}::{5}',
        inputs.ref || github.ref_name,
        inputs.profile,
        inputs.lane_set,
        inputs.lanes || 'default',
        inputs.artifact_build && 'artifact' || 'no-artifact',
        inputs.include_explicit_lanes && 'explicit' || 'default'
      ) ||
      format(
        'validation-lab::retained::{0}::{1}::{2}',
        inputs.supersession_mode,
        inputs.supersession_key || 'no-key',
        github.run_id
      )
    }}
  cancel-in-progress: ${{ inputs.supersession_mode == 'auto' }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve lab checkout ref and lane selection
    runs-on: ubuntu-24.04
    outputs:
      host_ref: ${{ steps.meta.outputs.host_ref }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      display_ref: ${{ steps.meta.outputs.display_ref }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      profile_intent: ${{ steps.meta.outputs.profile_intent }}
      profile_notes: ${{ steps.meta.outputs.profile_notes }}
      lane_summary: ${{ steps.meta.outputs.lane_summary }}
      selected_matrix: ${{ steps.meta.outputs.selected_matrix }}
      planned_matrix: ${{ steps.meta.outputs.planned_matrix }}
      selected_lane_ids: ${{ steps.meta.outputs.selected_lane_ids }}
      smoke_matrix: ${{ steps.meta.outputs.smoke_matrix }}
      smoke_workflow_matrix: ${{ steps.meta.outputs.smoke_workflow_matrix }}
      smoke_node_matrix: ${{ steps.meta.outputs.smoke_node_matrix }}
      smoke_rust_minimal_matrix: ${{ steps.meta.outputs.smoke_rust_minimal_matrix }}
      smoke_rust_integration_matrix: ${{ steps.meta.outputs.smoke_rust_integration_matrix }}
      smoke_release_matrix: ${{ steps.meta.outputs.smoke_release_matrix }}
      smoke_workflow_lane_count: ${{ steps.meta.outputs.smoke_workflow_lane_count }}
      smoke_node_lane_count: ${{ steps.meta.outputs.smoke_node_lane_count }}
      smoke_rust_minimal_lane_count: ${{ steps.meta.outputs.smoke_rust_minimal_lane_count }}
      smoke_rust_integration_lane_count: ${{ steps.meta.outputs.smoke_rust_integration_lane_count }}
      smoke_release_lane_count: ${{ steps.meta.outputs.smoke_release_lane_count }}
      run_selected_lanes: ${{ steps.meta.outputs.run_selected_lanes }}
      run_smoke_gate: ${{ steps.meta.outputs.run_smoke_gate }}
      smoke_gate_kind: ${{ steps.meta.outputs.smoke_gate_kind }}
      run_artifact: ${{ steps.meta.outputs.run_artifact }}
      matrix_fail_fast: ${{ steps.meta.outputs.matrix_fail_fast }}
      matrix_max_parallel: ${{ steps.meta.outputs.matrix_max_parallel }}
      selected_setup_classes: ${{ steps.meta.outputs.selected_setup_classes }}
      selected_workflow_matrix: ${{ steps.meta.outputs.selected_workflow_matrix }}
      selected_node_matrix: ${{ steps.meta.outputs.selected_node_matrix }}
      selected_rust_minimal_matrix: ${{ steps.meta.outputs.selected_rust_minimal_matrix }}
      selected_rust_integration_matrix: ${{ steps.meta.outputs.selected_rust_integration_matrix }}
      selected_release_matrix: ${{ steps.meta.outputs.selected_release_matrix }}
      selected_workflow_lane_count: ${{ steps.meta.outputs.selected_workflow_lane_count }}
      selected_node_lane_count: ${{ steps.meta.outputs.selected_node_lane_count }}
      selected_rust_minimal_lane_count: ${{ steps.meta.outputs.selected_rust_minimal_lane_count }}
      selected_rust_integration_lane_count: ${{ steps.meta.outputs.selected_rust_integration_lane_count }}
      selected_release_lane_count: ${{ steps.meta.outputs.selected_release_lane_count }}
      workflow_max_parallel: ${{ steps.meta.outputs.workflow_max_parallel }}
      node_max_parallel: ${{ steps.meta.outputs.node_max_parallel }}
      rust_minimal_max_parallel: ${{ steps.meta.outputs.rust_minimal_max_parallel }}
      rust_integration_max_parallel: ${{ steps.meta.outputs.rust_integration_max_parallel }}
      release_max_parallel: ${{ steps.meta.outputs.release_max_parallel }}
      preview_version: ${{ steps.meta.outputs.preview_version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Check out validation target
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ (inputs.profile == 'artifact' || inputs.artifact_build) && '0' || '1' }}
          # This input is consumed by actions/checkout as a branch-or-tag selector.
          # If you need exact-SHA pinning for workflow_dispatch, pin the host run via
          # the dispatcher/watcher layer and pass the branch name here so checkout resolves.
          ref: ${{ inputs.ref || github.sha }}
          path: validation-target

      - name: Compute validation-lab plan
        id: meta
        shell: bash
        env:
          LAB_PROFILE: ${{ inputs.profile }}
          LAB_LANE_SET: ${{ inputs.lane_set }}
          LAB_LANES: ${{ inputs.lanes }}
          LAB_ARTIFACT_BUILD: ${{ inputs.artifact_build }}
          LAB_INCLUDE_EXPLICIT_LANES: ${{ inputs.include_explicit_lanes }}
        run: |
          set -euo pipefail

          host_ref='${{ github.ref_name }}'
          checkout_ref='${{ inputs.ref || github.sha }}'
          display_ref='${{ inputs.ref || github.ref_name }}'
          target_checkout="${GITHUB_WORKSPACE}/validation-target"
          catalog_path="${target_checkout}/.github/validation-lanes.json"
          catalog_args=()
          if [[ -f "${catalog_path}" ]]; then
            catalog_args+=(--catalog-path "${catalog_path}")
          fi
          head_sha="$(git -C "${target_checkout}" rev-parse HEAD)"
          short_sha="$(git -C "${target_checkout}" rev-parse --short=8 HEAD)"
          display_slug="$(printf '%s' "${display_ref}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-' | cut -c1-48)"
          if [[ "${LAB_PROFILE}" == "artifact" || "${LAB_ARTIFACT_BUILD}" == "true" ]]; then
            latest_tag="$(git -C "${target_checkout}" tag --merged HEAD --list 'v*-sedna.*' --sort=-version:refname | head -n 1)"
            if [[ -n "${latest_tag}" ]]; then
              base_version="${latest_tag#v}"
            else
              base_version="0.0.0-sedna.0"
            fi
          else
            base_version="0.0.0-sedna.0"
          fi
          preview_version="${base_version}-ci.${GITHUB_RUN_NUMBER}+g${short_sha}"

          selection_meta="$(python3 .github/scripts/resolve_validation_plan.py lab --profile "${LAB_PROFILE}" --lane-set "${LAB_LANE_SET}" --lanes "${LAB_LANES}" --artifact-build "${LAB_ARTIFACT_BUILD}" --include-explicit-lanes "${LAB_INCLUDE_EXPLICIT_LANES}" "${catalog_args[@]}")"

          # Helper function for robustly parsing the validation plan metadata.
          # We include explicit error reporting for missing fields or malformed JSON
          # to diagnose environment-specific CI failures.
          parse_meta() {
            local field="$1"
            python3 - "$field" <<'PY'
          import json
          import os
          import sys

          field = sys.argv[1]
          meta_raw = os.environ["SELECTION_META"]

          try:
              meta = json.loads(meta_raw)
          except json.JSONDecodeError as exc:
              sys.stderr.write(f"ERROR: Failed to parse SELECTION_META as JSON: {exc}\n")
              raise SystemExit(1)

          if field not in meta:
              sys.stderr.write(f"ERROR: Key '{field}' not found in SELECTION_META\n")
              raise SystemExit(1)

          value = meta[field]
          if isinstance(value, (dict, list)):
              print(json.dumps(value, separators=(",", ":")))
          else:
              print(value)
          PY
          }

          profile_intent="$(SELECTION_META="${selection_meta}" parse_meta "profile_intent")"
          profile_notes="$(SELECTION_META="${selection_meta}" parse_meta "profile_notes")"
          lane_summary="$(SELECTION_META="${selection_meta}" parse_meta "lane_summary")"
          run_selected_lanes="$(SELECTION_META="${selection_meta}" parse_meta "run_selected_lanes")"
          run_smoke_gate="$(SELECTION_META="${selection_meta}" parse_meta "run_smoke_gate")"
          smoke_gate_kind="$(SELECTION_META="${selection_meta}" parse_meta "smoke_gate_kind")"
          smoke_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_matrix")"
          smoke_workflow_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_workflow_matrix")"
          smoke_node_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_node_matrix")"
          smoke_rust_minimal_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_minimal_matrix")"
          smoke_rust_integration_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_integration_matrix")"
          smoke_release_matrix="$(SELECTION_META="${selection_meta}" parse_meta "smoke_release_matrix")"
          smoke_workflow_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_workflow_lane_count")"
          smoke_node_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_node_lane_count")"
          smoke_rust_minimal_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_minimal_lane_count")"
          smoke_rust_integration_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_integration_lane_count")"
          smoke_release_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_release_lane_count")"
          selected_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_matrix")"
          planned_matrix="$(SELECTION_META="${selection_meta}" parse_meta "planned_matrix")"
          selected_lane_ids="$(SELECTION_META="${selection_meta}" parse_meta "selected_lane_ids")"
          run_artifact="$(SELECTION_META="${selection_meta}" parse_meta "run_artifact")"
          matrix_fail_fast="$(SELECTION_META="${selection_meta}" parse_meta "matrix_fail_fast")"
          matrix_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "matrix_max_parallel")"
          selected_setup_classes="$(SELECTION_META="${selection_meta}" parse_meta "selected_setup_classes")"
          selected_workflow_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_workflow_matrix")"
          selected_node_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_node_matrix")"
          selected_rust_minimal_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_matrix")"
          selected_rust_integration_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_matrix")"
          selected_release_matrix="$(SELECTION_META="${selection_meta}" parse_meta "selected_release_matrix")"
          selected_workflow_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_workflow_lane_count")"
          selected_node_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_node_lane_count")"
          selected_rust_minimal_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_lane_count")"
          selected_rust_integration_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_lane_count")"
          selected_release_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_release_lane_count")"
          workflow_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "workflow_max_parallel")"
          node_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "node_max_parallel")"
          rust_minimal_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "rust_minimal_max_parallel")"
          rust_integration_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "rust_integration_max_parallel")"
          release_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "release_max_parallel")"

          {
            echo "host_ref=${host_ref}"
            echo "checkout_ref=${checkout_ref}"
            echo "display_ref=${display_ref}"
            echo "head_sha=${head_sha}"
            echo "profile_intent=${profile_intent}"
            echo "profile_notes=${profile_notes}"
            echo "lane_summary=${lane_summary}"
            echo "run_selected_lanes=${run_selected_lanes}"
            echo "run_smoke_gate=${run_smoke_gate}"
            echo "smoke_gate_kind=${smoke_gate_kind}"
            echo "smoke_matrix=${smoke_matrix}"
            echo "selected_matrix=${selected_matrix}"
            echo "planned_matrix=${planned_matrix}"
            echo "selected_lane_ids=${selected_lane_ids}"
            echo "run_artifact=${run_artifact}"
            echo "matrix_fail_fast=${matrix_fail_fast}"
            echo "matrix_max_parallel=${matrix_max_parallel}"
            echo "smoke_workflow_matrix=${smoke_workflow_matrix}"
            echo "smoke_node_matrix=${smoke_node_matrix}"
            echo "smoke_rust_minimal_matrix=${smoke_rust_minimal_matrix}"
            echo "smoke_rust_integration_matrix=${smoke_rust_integration_matrix}"
            echo "smoke_release_matrix=${smoke_release_matrix}"
            echo "smoke_workflow_lane_count=${smoke_workflow_lane_count}"
            echo "smoke_node_lane_count=${smoke_node_lane_count}"
            echo "smoke_rust_minimal_lane_count=${smoke_rust_minimal_lane_count}"
            echo "smoke_rust_integration_lane_count=${smoke_rust_integration_lane_count}"
            echo "smoke_release_lane_count=${smoke_release_lane_count}"
            echo "selected_setup_classes=${selected_setup_classes}"
            echo "selected_workflow_matrix=${selected_workflow_matrix}"
            echo "selected_node_matrix=${selected_node_matrix}"
            echo "selected_rust_minimal_matrix=${selected_rust_minimal_matrix}"
            echo "selected_rust_integration_matrix=${selected_rust_integration_matrix}"
            echo "selected_release_matrix=${selected_release_matrix}"
            echo "selected_workflow_lane_count=${selected_workflow_lane_count}"
            echo "selected_node_lane_count=${selected_node_lane_count}"
            echo "selected_rust_minimal_lane_count=${selected_rust_minimal_lane_count}"
            echo "selected_rust_integration_lane_count=${selected_rust_integration_lane_count}"
            echo "selected_release_lane_count=${selected_release_lane_count}"
            echo "workflow_max_parallel=${workflow_max_parallel}"
            echo "node_max_parallel=${node_max_parallel}"
            echo "rust_minimal_max_parallel=${rust_minimal_max_parallel}"
            echo "rust_integration_max_parallel=${rust_integration_max_parallel}"
            echo "release_max_parallel=${release_max_parallel}"
            echo "preview_version=${preview_version}"
            echo "artifact_name=sedna-validation-${display_slug}-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize validation plan
        shell: bash
        run: |
          {
            echo "### Validation lab"
            echo
            echo "- Profile: \`${{ inputs.profile }}\`"
            echo "- Profile intent: \`${{ steps.meta.outputs.profile_intent }}\`"
            echo "- Lane set: \`${{ inputs.lane_set }}\`"
            echo "- Selection summary: \`${{ steps.meta.outputs.lane_summary }}\`"
            echo "- Explicit lanes supplied: \`${{ inputs.lanes != '' && 'true' || 'false' }}\`"
            echo "- Include explicit-only lanes: \`${{ inputs.include_explicit_lanes && 'true' || 'false' }}\`"
            echo "- Setup classes: \`${{ steps.meta.outputs.selected_setup_classes || '[]' }}\`"
            echo "- Artifact build: \`${{ inputs.artifact_build && 'true' || 'false' }}\`"
            echo "- Supersession mode: \`${{ inputs.supersession_mode }}\`"
            echo "- Supersession key: \`${{ inputs.supersession_key || 'none' }}\`"
            echo "- Profile notes: ${{ steps.meta.outputs.profile_notes }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke_workflow_lanes:
    name: Validation-lab smoke gate (workflow)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_workflow_lane_count) > 0
      }}
    strategy:
      fail-fast: true
      max-parallel: ${{ fromJson(needs.metadata.outputs.workflow_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_workflow_matrix) }}
    # validation-lab validates operator-selected refs. Do not add
    # `secrets: inherit` to generic workflow lanes.
    uses: ./.github/workflows/_validation-lane-workflow.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      needs_bazel: ${{ matrix.needs_bazel }}

  smoke_node_lanes:
    name: Validation-lab smoke gate (node)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_node_lane_count) > 0
      }}
    strategy:
      fail-fast: true
      max-parallel: ${{ fromJson(needs.metadata.outputs.node_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_node_matrix) }}
    uses: ./.github/workflows/_validation-lane-node.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}

  smoke_rust_minimal_lanes:
    name: Validation-lab smoke gate (rust minimal)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_rust_minimal_lane_count) > 0
      }}
    strategy:
      fail-fast: true
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_minimal_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_rust_minimal_matrix) }}
    uses: ./.github/workflows/_validation-lane-rust-minimal.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  smoke_rust_integration_lanes:
    name: Validation-lab smoke gate (rust integration)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_rust_integration_lane_count) > 0
      }}
    strategy:
      fail-fast: true
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_integration_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_rust_integration_matrix) }}
    uses: ./.github/workflows/_validation-lane-rust-integration.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  smoke_release_lanes:
    name: Validation-lab smoke gate (release)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_release_lane_count) > 0
      }}
    strategy:
      fail-fast: true
      max-parallel: ${{ fromJson(needs.metadata.outputs.release_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_release_matrix) }}
    uses: ./.github/workflows/_validation-lane-release.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  workflow_lanes:
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        fromJson(needs.metadata.outputs.selected_workflow_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.workflow_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_workflow_matrix) }}
    # validation-lab validates operator-selected refs. Do not add
    # `secrets: inherit` to generic workflow lanes.
    uses: ./.github/workflows/_validation-lane-workflow.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      needs_bazel: ${{ matrix.needs_bazel }}

  node_lanes:
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        fromJson(needs.metadata.outputs.selected_node_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.node_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_node_matrix) }}
    uses: ./.github/workflows/_validation-lane-node.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}

  rust_minimal_lanes:
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        fromJson(needs.metadata.outputs.selected_rust_minimal_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_minimal_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_rust_minimal_matrix) }}
    uses: ./.github/workflows/_validation-lane-rust-minimal.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  rust_integration_lanes:
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        fromJson(needs.metadata.outputs.selected_rust_integration_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_integration_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_rust_integration_matrix) }}
    uses: ./.github/workflows/_validation-lane-rust-integration.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  release_lanes:
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        fromJson(needs.metadata.outputs.selected_release_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.release_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_release_matrix) }}
    uses: ./.github/workflows/_validation-lane-release.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  artifact:
    needs:
      - metadata
      - smoke_workflow_lanes
      - smoke_node_lanes
      - smoke_rust_minimal_lanes
      - smoke_rust_integration_lanes
      - smoke_release_lanes
      - workflow_lanes
      - node_lanes
      - rust_minimal_lanes
      - rust_integration_lanes
      - release_lanes
    if: >-
      ${{
        always() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_artifact == 'true' &&
        (needs.smoke_workflow_lanes.result == 'success' || needs.smoke_workflow_lanes.result == 'skipped') &&
        (needs.smoke_node_lanes.result == 'success' || needs.smoke_node_lanes.result == 'skipped') &&
        (needs.smoke_rust_minimal_lanes.result == 'success' || needs.smoke_rust_minimal_lanes.result == 'skipped') &&
        (needs.smoke_rust_integration_lanes.result == 'success' || needs.smoke_rust_integration_lanes.result == 'skipped') &&
        (needs.smoke_release_lanes.result == 'success' || needs.smoke_release_lanes.result == 'skipped') &&
        (needs.workflow_lanes.result == 'success' || needs.workflow_lanes.result == 'skipped') &&
        (needs.node_lanes.result == 'success' || needs.node_lanes.result == 'skipped') &&
        (needs.rust_minimal_lanes.result == 'success' || needs.rust_minimal_lanes.result == 'skipped') &&
        (needs.rust_integration_lanes.result == 'success' || needs.rust_integration_lanes.result == 'skipped') &&
        (needs.release_lanes.result == 'success' || needs.release_lanes.result == 'skipped')
      }}
    uses: ./.github/workflows/_validation-lane-release.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: 1
      lane_phase: artifact_build
      summary_title: Validation lab artifact build
      setup_class: release
      release_version: ${{ needs.metadata.outputs.preview_version }}
      artifact_name: ${{ needs.metadata.outputs.artifact_name }}
      artifact_path: dist/*
      working_directory: .
      script_path: .github/scripts/validation-lanes/artifact-build.sh
      script_args_json: '[]'
      needs_just: false
      needs_node: false
      needs_nextest: false
      needs_linux_build_deps: false
      needs_dotslash: false
      needs_sccache: true
      cache_policy: ${{ inputs.supersession_mode != 'auto' && 'write-fallback' || 'restore-only' }}

  summary:
    name: Validation-lab summary
    needs:
      - metadata
      - smoke_workflow_lanes
      - smoke_node_lanes
      - smoke_rust_minimal_lanes
      - smoke_rust_integration_lanes
      - smoke_release_lanes
      - workflow_lanes
      - node_lanes
      - rust_minimal_lanes
      - rust_integration_lanes
      - release_lanes
      - artifact
    if: ${{ always() && needs.metadata.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download lane summary artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: validation-lane-summary-*
          path: ${{ runner.temp }}/validation-lane-summaries
          merge-multiple: true

      - name: Build validation summary artifact
        shell: bash
        run: |
          set -euo pipefail
          summary_file="${RUNNER_TEMP}/validation-summary.json"
          smoke_gate_result="skipped"
          if [[ "${{ needs.metadata.outputs.run_smoke_gate }}" == "true" ]]; then
            if [[ "${{ needs.smoke_workflow_lanes.result || 'skipped' }}" == "failure" || "${{ needs.smoke_node_lanes.result || 'skipped' }}" == "failure" || "${{ needs.smoke_rust_minimal_lanes.result || 'skipped' }}" == "failure" || "${{ needs.smoke_rust_integration_lanes.result || 'skipped' }}" == "failure" || "${{ needs.smoke_release_lanes.result || 'skipped' }}" == "failure" ]]; then
              smoke_gate_result="failure"
            elif [[ "${{ needs.smoke_workflow_lanes.result || 'skipped' }}" == "cancelled" || "${{ needs.smoke_node_lanes.result || 'skipped' }}" == "cancelled" || "${{ needs.smoke_rust_minimal_lanes.result || 'skipped' }}" == "cancelled" || "${{ needs.smoke_rust_integration_lanes.result || 'skipped' }}" == "cancelled" || "${{ needs.smoke_release_lanes.result || 'skipped' }}" == "cancelled" ]]; then
              smoke_gate_result="cancelled"
            elif [[ "${{ needs.smoke_workflow_lanes.result || 'skipped' }}" == "success" || "${{ needs.smoke_node_lanes.result || 'skipped' }}" == "success" || "${{ needs.smoke_rust_minimal_lanes.result || 'skipped' }}" == "success" || "${{ needs.smoke_rust_integration_lanes.result || 'skipped' }}" == "success" || "${{ needs.smoke_release_lanes.result || 'skipped' }}" == "success" ]]; then
              smoke_gate_result="success"
            fi
          fi
          python3 .github/scripts/aggregate_validation_summary.py \
            --repo "${GITHUB_REPOSITORY}" \
            --host-ref "${{ needs.metadata.outputs.host_ref }}" \
            --display-ref "${{ needs.metadata.outputs.display_ref }}" \
            --checkout-ref "${{ needs.metadata.outputs.checkout_ref }}" \
            --head-sha "${{ needs.metadata.outputs.head_sha }}" \
            --profile "${{ inputs.profile }}" \
            --lane-set "${{ inputs.lane_set }}" \
            --profile-intent "${{ needs.metadata.outputs.profile_intent }}" \
            --profile-notes "${{ needs.metadata.outputs.profile_notes }}" \
            --lane-summary "${{ needs.metadata.outputs.lane_summary }}" \
            --planned-matrix-json '${{ needs.metadata.outputs.planned_matrix }}' \
            --selected-lane-ids-json '${{ needs.metadata.outputs.selected_lane_ids }}' \
            --explicit-lanes "${{ inputs.lanes }}" \
            --supersession-mode "${{ inputs.supersession_mode }}" \
            --supersession-key "${{ inputs.supersession_key }}" \
            --notes-supplied "false" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --run-selected-lanes "${{ needs.metadata.outputs.run_selected_lanes }}" \
            --run-smoke-gate "${{ needs.metadata.outputs.run_smoke_gate }}" \
            --smoke-gate-kind "${{ needs.metadata.outputs.smoke_gate_kind }}" \
            --smoke-gate-result "${smoke_gate_result}" \
            --workflow-result "${{ needs.workflow_lanes.result || 'skipped' }}" \
            --node-result "${{ needs.node_lanes.result || 'skipped' }}" \
            --rust-minimal-result "${{ needs.rust_minimal_lanes.result || 'skipped' }}" \
            --rust-integration-result "${{ needs.rust_integration_lanes.result || 'skipped' }}" \
            --release-result "${{ needs.release_lanes.result || 'skipped' }}" \
            --run-artifact "${{ needs.metadata.outputs.run_artifact }}" \
            --artifact-result "${{ needs.artifact.result || 'skipped' }}" \
            --matrix-fail-fast "${{ needs.metadata.outputs.matrix_fail_fast }}" \
            --lane-summary-dir "${RUNNER_TEMP}/validation-lane-summaries" \
            --output "${summary_file}"
          echo "SUMMARY_FILE=${summary_file}" >> "$GITHUB_ENV"

      - name: Upload validation summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-summary
          path: ${{ env.SUMMARY_FILE }}
          overwrite: true
          retention-days: 3

      - name: Append validation summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' "${SUMMARY_FILE}" >> "$GITHUB_STEP_SUMMARY"
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          summary = payload["summary"]
          print("### Validation summary")
          print()
          print(f"- Overall conclusion: `{summary['overall_conclusion']}`")
          print(f"- Profile: `{payload['selection']['profile']}`")
          print(f"- Lane set: `{payload['selection']['lane_set']}`")
          print(f"- Lane count: `{summary['lane_count']}`")
          print(f"- Total recorded lane runtime (ms): `{summary.get('total_duration_ms', 0)}`")
          timing_breakdown = summary.get("timing_breakdown_ms") or {}
          if timing_breakdown:
              print("- Timing breakdown (ms):")
              for key, value in timing_breakdown.items():
                  print(f"  - `{key}`: `{value}`")
          setup_rows = summary.get("setup_classes") or []
          if setup_rows:
              print("- Setup class results:")
              for row in setup_rows:
                  print(
                      f"  - `{row['setup_class']}`: job `{row['job_result']}`, "
                      f"`{row['selected_lane_count']}` lanes"
                  )
          first_failure = summary.get("first_failure")
          if first_failure:
              print(f"- First surfaced blocker: `{first_failure.get('lane_id', 'unknown')}`")
              signal = first_failure.get("signal")
              if signal:
                  print(f"- First blocker signal: `{signal}`")
          PY
