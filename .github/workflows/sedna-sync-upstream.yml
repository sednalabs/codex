name: sedna-sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: sedna-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward upstream mirror
        shell: bash
        run: |
          set -euo pipefail

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/openai/codex.git
          else
            git remote add upstream https://github.com/openai/codex.git
          fi

          git fetch upstream main
          git fetch origin upstream-main || true

          if git show-ref --verify --quiet refs/remotes/origin/upstream-main; then
            if ! git merge-base --is-ancestor refs/remotes/origin/upstream-main refs/remotes/upstream/main; then
              echo "origin/upstream-main is not an ancestor of upstream/main; refusing non-fast-forward sync" >&2
              exit 1
            fi

            if [ "$(git rev-parse refs/remotes/origin/upstream-main)" = "$(git rev-parse refs/remotes/upstream/main)" ]; then
              echo "Already up to date"
              exit 0
            fi
          fi

          git push origin refs/remotes/upstream/main:refs/heads/upstream-main
