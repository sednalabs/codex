name: sedna-sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read

concurrency:
  group: sedna-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    outputs:
      synced_upstream_main_sha: ${{ steps.sync-mirror.outputs.synced_upstream_main_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve upstream sync credential mode
        id: credential-mode
        shell: bash
        env:
          APP_CLIENT_ID: ${{ vars.SEDNA_SYNC_UPSTREAM_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.SEDNA_SYNC_UPSTREAM_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APP_CLIENT_ID:-}" ] && [ -n "${APP_PRIVATE_KEY:-}" ]; then
            echo "use_app_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate upstream sync app token
        id: generate-sync-token
        if: ${{ steps.credential-mode.outputs.use_app_token == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SEDNA_SYNC_UPSTREAM_APP_CLIENT_ID }}
          private-key: ${{ secrets.SEDNA_SYNC_UPSTREAM_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-workflows: write

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward upstream mirror
        id: sync-mirror
        shell: bash
        env:
          SYNC_UPSTREAM_APP_TOKEN: ${{ steps.generate-sync-token.outputs.token }}
          SYNC_UPSTREAM_LEGACY_TOKEN: ${{ secrets.SEDNA_SYNC_UPSTREAM_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${SYNC_UPSTREAM_APP_TOKEN:-}" ]; then
            export SYNC_UPSTREAM_PUSH_TOKEN="${SYNC_UPSTREAM_APP_TOKEN}"
            echo "Using GitHub App installation token for upstream mirror sync"
          elif [ -n "${SYNC_UPSTREAM_LEGACY_TOKEN:-}" ]; then
            export SYNC_UPSTREAM_PUSH_TOKEN="${SYNC_UPSTREAM_LEGACY_TOKEN}"
            echo "::warning title=Legacy upstream sync token::Using SEDNA_SYNC_UPSTREAM_PUSH_TOKEN fallback; replace it with the GitHub App credential."
          else
            echo "Missing upstream sync credential. Configure SEDNA_SYNC_UPSTREAM_APP_CLIENT_ID and SEDNA_SYNC_UPSTREAM_APP_PRIVATE_KEY." >&2
            exit 1
          fi

          python3 .github/scripts/sync_upstream_mirror.py \
            --repo "$PWD" \
            --mode required-write \
            --github-output "$GITHUB_OUTPUT"

  audit:
    needs: sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        shell: bash
        run: |
          set -euo pipefail

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/openai/codex.git
          else
            git remote add upstream https://github.com/openai/codex.git
          fi

      - name: Run downstream divergence audit
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/downstream-divergence-audit.py \
            --repo "$PWD" \
            --downstream-remote origin \
            --downstream-branch main \
            --mirror-remote origin \
            --mirror-branch upstream-main \
            --upstream-remote upstream \
            --upstream-branch main \
            --expected-mirror-sha "${{ needs.sync.outputs.synced_upstream_main_sha }}" \
            --registry-path docs/divergences/index.yaml \
            --output-dir target/downstream-divergence-audit \
            --format both \
            --code-only \
            --enforce-registry

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: downstream-divergence-audit
          path: target/downstream-divergence-audit
