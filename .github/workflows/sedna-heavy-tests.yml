name: sedna-heavy-tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to validate
        required: false
        type: string
      lane:
        description: Downstream regression lane
        required: true
        type: choice
        options:
          - all
          - core-compile-smoke
          - core-carry-smoke
          - core-ledger-smoke
          - core-runtime-surface-smoke
          - codex.core-startup-sync-targeted
          - codex.core-subagent-surface-targeted
          - codex.core-subagent-notification-contract-targeted
          - codex.core-subagent-notification-visibility-targeted
          - codex.core-multi-agent-orchestration-targeted
          - codex.core-persisted-subagent-descendants-targeted
          - codex.core-context-serialization-targeted
          - codex.core-attestation-targeted
          - codex.state-spawn-lineage-contract-targeted
          - codex.app-server-protocol-test
          - codex.downstream-docs-check
          - downstream-ledger-seam
        default: all
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
  merge_group: {}
  schedule:
    - cron: "15 16 * * *"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve heavy-test checkout ref and lane selection
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.action != 'labeled' ||
        github.event.label.name == 'ci:heavy'
      }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      smoke_gate_kind: ${{ steps.meta.outputs.smoke_gate_kind }}
      smoke_matrix: ${{ steps.meta.outputs.smoke_matrix }}
      run_smoke_gate: ${{ steps.meta.outputs.run_smoke_gate }}
      run_selected_lanes: ${{ steps.meta.outputs.run_selected_lanes }}
      selected_matrix: ${{ steps.meta.outputs.selected_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Resolve lane selection from the workflow revision itself so manual runs
          # can target older refs that predate this planner script.
          ref: ${{ github.workflow_sha || github.sha }}

      - name: Compute checkout ref
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          checkout_ref='${{ github.sha }}'
          run_all_lanes=false
          run_core_family=false
          run_attestation_family=false
          run_workflow_family=false
          run_ui_protocol_family=false
          run_docs_family=false
          files=()

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n '${{ inputs.ref }}' ]]; then
            checkout_ref='${{ inputs.ref }}'
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            checkout_ref='${{ github.event.pull_request.head.sha }}'
          fi

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:heavy') }}" == 'true' ]]; then
              run_all_lanes=true
            fi

            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA...$HEAD_SHA")
          elif [[ '${{ github.event_name }}' == 'push' ]]; then
            # Pushes to protected main should always run the full heavy matrix.
            run_all_lanes=true
          else
            run_all_lanes=true
          fi

          for f in "${files[@]}"; do
            case "$f" in
              codex-rs/Cargo.toml|codex-rs/Cargo.lock)
                run_core_family=true
                run_ui_protocol_family=true
                ;;
              codex-rs/core/src/memories/phase2.rs|codex-rs/core/src/memories/phase2_attestation_tests.rs|codex-rs/state/src/runtime/phase2_attestation.rs|codex-rs/state/migrations/0023_phase2_attestation_roots.sql)
                run_core_family=true
                run_attestation_family=true
                ;;
              codex-rs/cli/*|codex-rs/common/*|codex-rs/core/*|codex-rs/hooks/*|codex-rs/linux-sandbox/*|codex-rs/state/*|codex-rs/windows-sandbox-rs/*)
                run_core_family=true
                ;;
              codex-rs/code-mode/*)
                run_core_family=true
              ;;
              codex-rs/app-server/*|codex-rs/app-server-protocol/*|codex-rs/protocol/*|codex-rs/tui/*)
                run_ui_protocol_family=true
                ;;
              docs/carry-divergence-ledger.md|docs/downstream-regression-matrix.md|docs/downstream-tool-surface-matrix.md|docs/downstream.md)
                run_docs_family=true
                ;;
              .github/*|justfile)
                run_workflow_family=true
                ;;
            esac
          done

          selection_meta="$(python3 .github/scripts/resolve_validation_plan.py heavy --event-name '${{ github.event_name }}' --requested-lane '${{ inputs.lane }}' --run-all-lanes "${run_all_lanes}" --run-core-family "${run_core_family}" --run-attestation-family "${run_attestation_family}" --run-workflow-family "${run_workflow_family}" --run-ui-protocol-family "${run_ui_protocol_family}" --run-docs-family "${run_docs_family}")"
          run_smoke_gate="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["run_smoke_gate"])')"
          smoke_gate_kind="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["smoke_gate_kind"])')"
          smoke_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["smoke_matrix"], separators=(",", ":")))')"
          selected_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_matrix"], separators=(",", ":")))')"

          {
            echo "checkout_ref=${checkout_ref}"
            echo "smoke_gate_kind=${smoke_gate_kind}"
            echo "smoke_matrix=${smoke_json}"
            echo "run_smoke_gate=${run_smoke_gate}"
            echo "run_selected_lanes=$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["run_selected_lanes"])')"
            echo "selected_matrix=${selected_json}"
          } >> "$GITHUB_OUTPUT"

  smoke_gate:
    name: Heavy preflight smoke
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true'
      }}
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      summary_title: ${{ matrix.lane_id }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  downstream_lanes:
    needs:
      - metadata
      - smoke_gate
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        (needs.smoke_gate.result == 'success' || needs.smoke_gate.result == 'skipped') &&
        needs.metadata.outputs.run_selected_lanes == 'true'
      }}
    strategy:
      fail-fast: ${{ github.event_name != 'push' || github.ref_name != 'main' }}
      max-parallel: 4
      matrix: ${{ fromJson(needs.metadata.outputs.selected_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      summary_title: ${{ matrix.lane_id }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}
