name: sedna-heavy-tests
run-name: >-
  sedna-heavy-tests
  ${{ github.event_name == 'workflow_dispatch' && ' [manual]' ||
      github.event_name == 'pull_request' && format(' [pr={0}]', github.event.pull_request.number) ||
      github.event_name == 'merge_group' && ' [merge-group]' ||
      ' [branch]' }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to validate
        required: false
        type: string
      lane:
        description: Downstream regression lane
        required: true
        type: choice
        options:
          - all
          - core-compile-smoke
          - core-carry-core-smoke
          - codex.nextest-archive-core-carry-pilot
          - core-carry-ui-smoke
          - core-ledger-smoke
          - core-runtime-surface-smoke
          - codex.core-startup-sync-targeted
          - codex.core-subagent-surface-targeted
          - codex.core-subagent-inspect-tree-fallback-targeted
          - codex.core-subagent-notification-contract-targeted
          - codex.core-subagent-notification-visibility-targeted
          - codex.tui-thread-session-policy-targeted
          - codex.tui-esc-interrupt-targeted
          - codex.tui-front-queue-submit-targeted
          - codex.tui-transcript-viewport-targeted
          - codex.tui-brokered-tool-replay-targeted
          - codex.tui-config-refresh-session-targeted
          - codex.tui-agent-picker-usage-targeted
          - codex.tui-agent-picker-targeted
          - codex.tui-agent-picker-model-surface-targeted
          - codex.spawn-agent-tool-model-surface-targeted
          - codex.spawn-agent-description-model-surface-targeted
          - codex.tui-agent-picker-tree-targeted
          - codex.tui-agent-usage-totals-targeted
          - codex.core-multi-agent-orchestration-targeted
          - codex.blocking-waits-targeted
          - codex.custom-prompts-targeted
          - codex.mcp-safety-targeted
          - codex.core-subagent-model-pinning-targeted
          - codex.core-subagent-spawn-approval-targeted
          - codex.core-persisted-subagent-descendants-targeted
          - codex.core-context-serialization-targeted
          - codex.core-attestation-targeted
          - codex.state-spawn-lineage-contract-targeted
          - codex.code-mode-declaration-targeted
          - codex.app-server-protocol-test
          - codex.app-server-computer-use-targeted
          - codex.native-computer-use-tool-registry-targeted
          - codex.app-server-thread-cwd-targeted
          - codex.agent-workflow-sanity
          - codex.shell-tool-mcp-ci
          - codex.build-policy-sanity
          - codex.workflow-ci-sanity
          - codex.argument-comment-lint
          - codex.downstream-docs-check
          - sedna.release-linux-smoke
          - downstream-ledger-seam
        default: all
      rust_batching:
        description: Batch downstream Rust lanes to reuse runner-local build artifacts
        required: false
        type: choice
        options:
          - auto
          - off
          - force
        default: auto
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
  merge_group: {}
#  schedule:
#    - cron: "15 16 * * *"
concurrency:
  group: >-
    ${{
      github.workflow
    }}-${{
      github.event_name == 'workflow_dispatch' &&
      format('{0}-{1}', inputs.ref || github.ref_name, inputs.lane || 'all') ||
      github.event_name == 'pull_request' &&
      format('pr-{0}', github.event.pull_request.number) ||
      github.ref_name
    }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

permissions:
  actions: read
  contents: read

jobs:
  metadata:
    name: Resolve heavy-test checkout ref and lane selection
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        (
          (github.event.action != 'labeled' || github.event.label.name == 'ci:heavy') &&
          (github.event.pull_request.draft == false || github.event.label.name == 'ci:heavy')
        )
      }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      checkout_sha: ${{ steps.meta.outputs.checkout_sha }}
      display_ref: ${{ steps.meta.outputs.display_ref }}
      planner_fingerprint: ${{ steps.meta.outputs.planner_fingerprint }}
      dedupe_reason: ${{ steps.meta.outputs.dedupe_reason }}
      smoke_gate_kind: ${{ steps.meta.outputs.smoke_gate_kind }}
      smoke_matrix: ${{ steps.meta.outputs.smoke_matrix }}
      smoke_workflow_matrix: ${{ steps.meta.outputs.smoke_workflow_matrix }}
      smoke_node_matrix: ${{ steps.meta.outputs.smoke_node_matrix }}
      smoke_rust_minimal_matrix: ${{ steps.meta.outputs.smoke_rust_minimal_matrix }}
      smoke_rust_integration_matrix: ${{ steps.meta.outputs.smoke_rust_integration_matrix }}
      smoke_release_matrix: ${{ steps.meta.outputs.smoke_release_matrix }}
      smoke_workflow_lane_count: ${{ steps.meta.outputs.smoke_workflow_lane_count }}
      smoke_node_lane_count: ${{ steps.meta.outputs.smoke_node_lane_count }}
      smoke_rust_minimal_lane_count: ${{ steps.meta.outputs.smoke_rust_minimal_lane_count }}
      smoke_rust_integration_lane_count: ${{ steps.meta.outputs.smoke_rust_integration_lane_count }}
      smoke_release_lane_count: ${{ steps.meta.outputs.smoke_release_lane_count }}
      run_smoke_gate: ${{ steps.meta.outputs.run_smoke_gate }}
      run_selected_lanes: ${{ steps.meta.outputs.run_selected_lanes }}
      planned_matrix: ${{ steps.meta.outputs.planned_matrix }}
      selected_matrix: ${{ steps.meta.outputs.selected_matrix }}
      selected_workflow_matrix: ${{ steps.meta.outputs.selected_workflow_matrix }}
      selected_node_matrix: ${{ steps.meta.outputs.selected_node_matrix }}
      selected_rust_minimal_matrix: ${{ steps.meta.outputs.selected_rust_minimal_matrix }}
      selected_rust_integration_matrix: ${{ steps.meta.outputs.selected_rust_integration_matrix }}
      selected_release_matrix: ${{ steps.meta.outputs.selected_release_matrix }}
      selected_rust_minimal_batch_matrix: ${{ steps.meta.outputs.selected_rust_minimal_batch_matrix }}
      selected_rust_integration_batch_matrix: ${{ steps.meta.outputs.selected_rust_integration_batch_matrix }}
      selected_lane_ids: ${{ steps.meta.outputs.selected_lane_ids }}
      selected_workflow_lane_count: ${{ steps.meta.outputs.selected_workflow_lane_count }}
      selected_node_lane_count: ${{ steps.meta.outputs.selected_node_lane_count }}
      selected_rust_minimal_lane_count: ${{ steps.meta.outputs.selected_rust_minimal_lane_count }}
      selected_rust_integration_lane_count: ${{ steps.meta.outputs.selected_rust_integration_lane_count }}
      selected_release_lane_count: ${{ steps.meta.outputs.selected_release_lane_count }}
      selected_rust_minimal_batch_count: ${{ steps.meta.outputs.selected_rust_minimal_batch_count }}
      selected_rust_integration_batch_count: ${{ steps.meta.outputs.selected_rust_integration_batch_count }}
      rust_batching_mode: ${{ steps.meta.outputs.rust_batching_mode }}
      rust_batching_reason: ${{ steps.meta.outputs.rust_batching_reason }}
      matrix_fail_fast: ${{ steps.meta.outputs.matrix_fail_fast }}
      continue_after_smoke_failure: ${{ steps.meta.outputs.continue_after_smoke_failure }}
      eager_release_lanes: ${{ steps.meta.outputs.eager_release_lanes }}
      workflow_max_parallel: ${{ steps.meta.outputs.workflow_max_parallel }}
      node_max_parallel: ${{ steps.meta.outputs.node_max_parallel }}
      rust_minimal_max_parallel: ${{ steps.meta.outputs.rust_minimal_max_parallel }}
      rust_integration_max_parallel: ${{ steps.meta.outputs.rust_integration_max_parallel }}
      release_max_parallel: ${{ steps.meta.outputs.release_max_parallel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Resolve lane selection from the workflow revision itself so manual runs
          # can target older refs that predate this planner script.
          ref: ${{ github.workflow_sha || github.sha }}

      - name: Compute checkout ref
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          checkout_ref='${{ github.sha }}'
          checkout_sha='${{ github.sha }}'
          display_ref='${{ github.ref_name }}'
          run_all_lanes=false
          run_core_family=false
          run_attestation_family=false
          run_workflow_family=false
          run_ui_protocol_family=false
          run_docs_family=false
          files=()

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n '${{ inputs.ref }}' ]]; then
            checkout_ref='${{ inputs.ref }}'
            display_ref='${{ inputs.ref }}'
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            checkout_ref='${{ github.event.pull_request.head.sha }}'
            display_ref="${PR_HEAD_REF}"
          fi

          if [[ ! "${checkout_ref}" =~ ^[0-9a-f]{40}$ ]]; then
            git fetch --no-tags --depth=1 origin "${checkout_ref}"
            checkout_sha="$(git rev-parse FETCH_HEAD)"
          fi

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:heavy') }}" == 'true' ]]; then
              run_all_lanes=true
            fi

            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA...$HEAD_SHA")
          else
            run_all_lanes=true
          fi

          for f in "${files[@]}"; do
            case "$f" in
              codex-rs/Cargo.toml|codex-rs/Cargo.lock)
                run_core_family=true
                run_ui_protocol_family=true
                ;;
              codex-rs/core/src/memories/phase2.rs|codex-rs/core/src/memories/phase2_attestation_tests.rs|codex-rs/state/src/runtime/phase2_attestation.rs|codex-rs/state/migrations/0024_phase2_attestation_roots.sql)
                run_core_family=true
                run_attestation_family=true
                ;;
              codex-rs/cli/*|codex-rs/common/*|codex-rs/core/*|codex-rs/hooks/*|codex-rs/linux-sandbox/*|codex-rs/state/*|codex-rs/windows-sandbox-rs/*)
                run_core_family=true
                ;;
              codex-rs/code-mode/*)
                run_core_family=true
              ;;
              codex-rs/app-server/*|codex-rs/app-server-protocol/*|codex-rs/protocol/*|codex-rs/tui/*)
                run_ui_protocol_family=true
                ;;
              docs/carry-divergence-ledger.md|docs/downstream-regression-matrix.md|docs/downstream-tool-surface-matrix.md|docs/downstream.md)
                run_docs_family=true
                ;;
              .github/*|justfile)
                run_workflow_family=true
                ;;
            esac
          done

          files_json="$(printf '%s\n' "${files[@]}" | jq -R . | jq -sc .)"
          selection_meta="$(python3 .github/scripts/resolve_validation_plan.py heavy --event-name '${{ github.event_name }}' --requested-lane '${{ inputs.lane }}' --run-all-lanes "${run_all_lanes}" --run-core-family "${run_core_family}" --run-attestation-family "${run_attestation_family}" --run-workflow-family "${run_workflow_family}" --run-ui-protocol-family "${run_ui_protocol_family}" --run-docs-family "${run_docs_family}" --changed-files-json "${files_json}" --rust-batching '${{ inputs.rust_batching || 'auto' }}' --rust-batching-override '${{ vars.SEDNA_HEAVY_RUST_BATCHING }}')"

          parse_meta() {
            local field="$1"
            python3 - "$field" <<'PY'
          import json
          import os
          import sys

          field = sys.argv[1]
          meta = json.loads(os.environ["SELECTION_META"])
          value = meta[field]
          if isinstance(value, (dict, list)):
              print(json.dumps(value, separators=(",", ":")))
          else:
              print(value)
          PY
          }

          run_smoke_gate="$(SELECTION_META="${selection_meta}" parse_meta "run_smoke_gate")"
          smoke_gate_kind="$(SELECTION_META="${selection_meta}" parse_meta "smoke_gate_kind")"
          smoke_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_matrix")"
          smoke_workflow_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_workflow_matrix")"
          smoke_node_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_node_matrix")"
          smoke_rust_minimal_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_minimal_matrix")"
          smoke_rust_integration_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_integration_matrix")"
          smoke_release_json="$(SELECTION_META="${selection_meta}" parse_meta "smoke_release_matrix")"
          planned_json="$(SELECTION_META="${selection_meta}" parse_meta "planned_matrix")"
          selected_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_matrix")"
          selected_workflow_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_workflow_matrix")"
          selected_node_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_node_matrix")"
          selected_rust_minimal_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_matrix")"
          selected_rust_integration_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_matrix")"
          selected_release_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_release_matrix")"
          selected_rust_minimal_batch_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_batch_matrix")"
          selected_rust_integration_batch_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_batch_matrix")"
          selected_lane_ids_json="$(SELECTION_META="${selection_meta}" parse_meta "selected_lane_ids")"
          smoke_workflow_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_workflow_lane_count")"
          smoke_node_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_node_lane_count")"
          smoke_rust_minimal_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_minimal_lane_count")"
          smoke_rust_integration_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_rust_integration_lane_count")"
          smoke_release_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "smoke_release_lane_count")"
          selected_workflow_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_workflow_lane_count")"
          selected_node_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_node_lane_count")"
          selected_rust_minimal_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_lane_count")"
          selected_rust_integration_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_lane_count")"
          selected_release_lane_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_release_lane_count")"
          selected_rust_minimal_batch_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_minimal_batch_count")"
          selected_rust_integration_batch_count="$(SELECTION_META="${selection_meta}" parse_meta "selected_rust_integration_batch_count")"
          rust_batching_mode="$(SELECTION_META="${selection_meta}" parse_meta "rust_batching_mode")"
          rust_batching_reason="$(SELECTION_META="${selection_meta}" parse_meta "rust_batching_reason")"
          eager_release_lanes="$(SELECTION_META="${selection_meta}" parse_meta "eager_release_lanes")"
          workflow_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "workflow_max_parallel")"
          node_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "node_max_parallel")"
          rust_minimal_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "rust_minimal_max_parallel")"
          rust_integration_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "rust_integration_max_parallel")"
          release_max_parallel="$(SELECTION_META="${selection_meta}" parse_meta "release_max_parallel")"
          matrix_fail_fast="$(SELECTION_META="${selection_meta}" parse_meta "matrix_fail_fast")"
          continue_after_smoke_failure="$(SELECTION_META="${selection_meta}" parse_meta "continue_after_smoke_failure")"
          planner_fingerprint="$(SELECTION_META="${selection_meta}" python3 -c 'import hashlib, json, os; payload = json.loads(os.environ["SELECTION_META"]); source = json.dumps({"requested_lane": "${{ inputs.lane }}", "run_smoke_gate": payload["run_smoke_gate"], "selected_lane_ids": payload["selected_lane_ids"]}, sort_keys=True, separators=(",", ":")); print(hashlib.sha256(source.encode("utf-8")).hexdigest()[:16])')"
          dedupe_reason=""
          run_selected_lanes="true"

          if [[ '${{ github.event_name }}' == 'pull_request' && '${{ github.event.action }}' == 'ready_for_review' ]]; then
            duplicate_run="$(
              gh api \
                -H 'Accept: application/vnd.github+json' \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/sedna-heavy-tests.yml/runs?event=pull_request&per_page=100" \
                --jq '
                  first(
                    .workflow_runs[]
                    | select(.id != ('"${GITHUB_RUN_ID}"' | tonumber))
                    | select(.head_sha == "'"${checkout_sha}"'")
                    | select(any(.pull_requests[]?; .number == ('"${{ github.event.pull_request.number }}"' | tonumber)))
                    | select((.status == "queued") or (.status == "in_progress") or (.conclusion == "success"))
                    | .html_url
                  ) // ""
                '
            )"
            if [[ -n "${duplicate_run}" ]]; then
              dedupe_reason="ready_for_review duplicate skipped; equivalent heavy evidence already exists for ${checkout_sha} (${duplicate_run})"
              run_smoke_gate="false"
              run_selected_lanes="false"
              smoke_gate_kind=""
              smoke_json='{"include":[]}'
              smoke_workflow_json='{"include":[]}'
              smoke_node_json='{"include":[]}'
              smoke_rust_minimal_json='{"include":[]}'
              smoke_rust_integration_json='{"include":[]}'
              smoke_release_json='{"include":[]}'
              planned_json='{"include":[]}'
              selected_json='{"include":[]}'
              selected_workflow_json='{"include":[]}'
              selected_node_json='{"include":[]}'
              selected_rust_minimal_json='{"include":[]}'
              selected_rust_integration_json='{"include":[]}'
              selected_release_json='{"include":[]}'
              selected_rust_minimal_batch_json='{"include":[]}'
              selected_rust_integration_batch_json='{"include":[]}'
              selected_lane_ids_json='[]'
              smoke_workflow_lane_count='0'
              smoke_node_lane_count='0'
              smoke_rust_minimal_lane_count='0'
              smoke_rust_integration_lane_count='0'
              smoke_release_lane_count='0'
              selected_workflow_lane_count='0'
              selected_node_lane_count='0'
              selected_rust_minimal_lane_count='0'
              selected_rust_integration_lane_count='0'
              selected_release_lane_count='0'
              selected_rust_minimal_batch_count='0'
              selected_rust_integration_batch_count='0'
              eager_release_lanes='false'
            fi
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "checkout_sha=${checkout_sha}"
            echo "display_ref=${display_ref}"
            echo "planner_fingerprint=${planner_fingerprint}"
            echo "dedupe_reason=${dedupe_reason}"
            echo "smoke_gate_kind=${smoke_gate_kind}"
            echo "smoke_matrix=${smoke_json}"
            echo "smoke_workflow_matrix=${smoke_workflow_json}"
            echo "smoke_node_matrix=${smoke_node_json}"
            echo "smoke_rust_minimal_matrix=${smoke_rust_minimal_json}"
            echo "smoke_rust_integration_matrix=${smoke_rust_integration_json}"
            echo "smoke_release_matrix=${smoke_release_json}"
            echo "smoke_workflow_lane_count=${smoke_workflow_lane_count}"
            echo "smoke_node_lane_count=${smoke_node_lane_count}"
            echo "smoke_rust_minimal_lane_count=${smoke_rust_minimal_lane_count}"
            echo "smoke_rust_integration_lane_count=${smoke_rust_integration_lane_count}"
            echo "smoke_release_lane_count=${smoke_release_lane_count}"
            echo "run_smoke_gate=${run_smoke_gate}"
            echo "matrix_fail_fast=${matrix_fail_fast}"
            echo "continue_after_smoke_failure=${continue_after_smoke_failure}"
            echo "eager_release_lanes=${eager_release_lanes}"
            echo "run_selected_lanes=${run_selected_lanes}"
            echo "planned_matrix=${planned_json}"
            echo "selected_matrix=${selected_json}"
            echo "selected_workflow_matrix=${selected_workflow_json}"
            echo "selected_node_matrix=${selected_node_json}"
            echo "selected_rust_minimal_matrix=${selected_rust_minimal_json}"
            echo "selected_rust_integration_matrix=${selected_rust_integration_json}"
            echo "selected_release_matrix=${selected_release_json}"
            echo "selected_rust_minimal_batch_matrix=${selected_rust_minimal_batch_json}"
            echo "selected_rust_integration_batch_matrix=${selected_rust_integration_batch_json}"
            echo "selected_lane_ids=${selected_lane_ids_json}"
            echo "selected_workflow_lane_count=${selected_workflow_lane_count}"
            echo "selected_node_lane_count=${selected_node_lane_count}"
            echo "selected_rust_minimal_lane_count=${selected_rust_minimal_lane_count}"
            echo "selected_rust_integration_lane_count=${selected_rust_integration_lane_count}"
            echo "selected_release_lane_count=${selected_release_lane_count}"
            echo "selected_rust_minimal_batch_count=${selected_rust_minimal_batch_count}"
            echo "selected_rust_integration_batch_count=${selected_rust_integration_batch_count}"
            echo "rust_batching_mode=${rust_batching_mode}"
            echo "rust_batching_reason=${rust_batching_reason}"
            echo "workflow_max_parallel=${workflow_max_parallel}"
            echo "node_max_parallel=${node_max_parallel}"
            echo "rust_minimal_max_parallel=${rust_minimal_max_parallel}"
            echo "rust_integration_max_parallel=${rust_integration_max_parallel}"
            echo "release_max_parallel=${release_max_parallel}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### sedna-heavy-tests plan"
            echo
            echo "- Host workflow ref: \`${{ github.ref_name }}\`"
            echo "- Validated checkout ref: \`${checkout_ref}\`"
            echo "- Resolved checkout SHA: \`${checkout_sha}\`"
            echo "- Display ref: \`${display_ref}\`"
            echo "- Requested lane: \`${{ inputs.lane || 'auto' }}\`"
            echo "- Planner fingerprint: \`${planner_fingerprint}\`"
            echo "- Rust batching: \`${rust_batching_mode}\` (${rust_batching_reason})"
            echo "- Eager release lanes: \`${eager_release_lanes}\`"
            if [[ -n "${dedupe_reason}" ]]; then
              echo "- Dedupe: ${dedupe_reason}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  smoke_workflow_lanes:
    name: Heavy preflight smoke (workflow)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_workflow_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.workflow_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_workflow_matrix) }}
    uses: ./.github/workflows/_validation-lane-workflow.yml
    secrets: inherit
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      checkout_fetch_depth: ${{ matrix.checkout_fetch_depth }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      working_directory: ${{ matrix.working_directory }}
      script_path: ${{ matrix.script_path }}
      script_args_json: ${{ toJson(matrix.script_args) }}
      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      needs_bazel: ${{ matrix.needs_bazel }}

  smoke_node_lanes:
    name: Heavy preflight smoke (node)
    needs:
      - metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
