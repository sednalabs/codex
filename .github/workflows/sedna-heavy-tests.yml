name: sedna-heavy-tests
run-name: >-
  sedna-heavy-tests
  ${{ github.event_name == 'workflow_dispatch' && inputs.ref && format(' [target={0}]', inputs.ref) ||
      github.event_name == 'pull_request' && format(' [pr={0}]', github.event.pull_request.number) ||
      format(' [ref={0}]', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to validate
        required: false
        type: string
      lane:
        description: Downstream regression lane
        required: true
        type: choice
        options:
          - all
          - core-compile-smoke
          - core-carry-core-smoke
          - core-carry-ui-smoke
          - core-ledger-smoke
          - core-runtime-surface-smoke
          - codex.core-startup-sync-targeted
          - codex.core-subagent-surface-targeted
          - codex.core-subagent-notification-contract-targeted
          - codex.core-subagent-notification-visibility-targeted
          - codex.tui-thread-session-policy-targeted
          - codex.tui-esc-interrupt-targeted
          - codex.tui-front-queue-submit-targeted
          - codex.tui-transcript-viewport-targeted
          - codex.tui-config-refresh-session-targeted
          - codex.tui-agent-picker-usage-targeted
          - codex.tui-agent-picker-targeted
          - codex.tui-agent-picker-model-surface-targeted
          - codex.spawn-agent-tool-model-surface-targeted
          - codex.spawn-agent-description-model-surface-targeted
          - codex.tui-agent-picker-tree-targeted
          - codex.tui-agent-usage-totals-targeted
          - codex.core-multi-agent-orchestration-targeted
          - codex.blocking-waits-targeted
          - codex.core-subagent-model-pinning-targeted
          - codex.core-subagent-spawn-approval-targeted
          - codex.core-persisted-subagent-descendants-targeted
          - codex.core-context-serialization-targeted
          - codex.core-attestation-targeted
          - codex.state-spawn-lineage-contract-targeted
          - codex.code-mode-declaration-targeted
          - codex.app-server-protocol-test
          - codex.app-server-thread-cwd-targeted
          - codex.workflow-ci-sanity
          - codex.downstream-docs-check
          - codex.release-linux-build-smoke
          - downstream-ledger-seam
        default: all
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
  merge_group: {}
#  schedule:
#    - cron: "15 16 * * *"
concurrency:
  group: >-
    ${{
      github.workflow
    }}-${{
      github.event_name == 'workflow_dispatch' &&
      format('{0}-{1}', inputs.ref || github.ref_name, inputs.lane || 'all') ||
      github.event_name == 'pull_request' &&
      format('pr-{0}', github.event.pull_request.number) ||
      github.ref_name
    }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

permissions:
  actions: read
  contents: read

jobs:
  metadata:
    name: Resolve heavy-test checkout ref and lane selection
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        (
          (github.event.action != 'labeled' || github.event.label.name == 'ci:heavy') &&
          (github.event.pull_request.draft == false || github.event.label.name == 'ci:heavy')
        )
      }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      checkout_sha: ${{ steps.meta.outputs.checkout_sha }}
      display_ref: ${{ steps.meta.outputs.display_ref }}
      planner_fingerprint: ${{ steps.meta.outputs.planner_fingerprint }}
      dedupe_reason: ${{ steps.meta.outputs.dedupe_reason }}
      smoke_gate_kind: ${{ steps.meta.outputs.smoke_gate_kind }}
      smoke_matrix: ${{ steps.meta.outputs.smoke_matrix }}
      smoke_light_matrix: ${{ steps.meta.outputs.smoke_light_matrix }}
      smoke_rust_matrix: ${{ steps.meta.outputs.smoke_rust_matrix }}
      smoke_heavy_matrix: ${{ steps.meta.outputs.smoke_heavy_matrix }}
      smoke_light_lane_count: ${{ steps.meta.outputs.smoke_light_lane_count }}
      smoke_rust_lane_count: ${{ steps.meta.outputs.smoke_rust_lane_count }}
      smoke_heavy_lane_count: ${{ steps.meta.outputs.smoke_heavy_lane_count }}
      run_smoke_gate: ${{ steps.meta.outputs.run_smoke_gate }}
      run_selected_lanes: ${{ steps.meta.outputs.run_selected_lanes }}
      planned_matrix: ${{ steps.meta.outputs.planned_matrix }}
      selected_matrix: ${{ steps.meta.outputs.selected_matrix }}
      selected_light_matrix: ${{ steps.meta.outputs.selected_light_matrix }}
      selected_rust_matrix: ${{ steps.meta.outputs.selected_rust_matrix }}
      selected_heavy_matrix: ${{ steps.meta.outputs.selected_heavy_matrix }}
      selected_lane_ids: ${{ steps.meta.outputs.selected_lane_ids }}
      selected_light_lane_count: ${{ steps.meta.outputs.selected_light_lane_count }}
      selected_rust_lane_count: ${{ steps.meta.outputs.selected_rust_lane_count }}
      selected_heavy_lane_count: ${{ steps.meta.outputs.selected_heavy_lane_count }}
      matrix_fail_fast: ${{ steps.meta.outputs.matrix_fail_fast }}
      continue_after_smoke_failure: ${{ steps.meta.outputs.continue_after_smoke_failure }}
      light_max_parallel: ${{ steps.meta.outputs.light_max_parallel }}
      rust_max_parallel: ${{ steps.meta.outputs.rust_max_parallel }}
      heavy_max_parallel: ${{ steps.meta.outputs.heavy_max_parallel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Resolve lane selection from the workflow revision itself so manual runs
          # can target older refs that predate this planner script.
          ref: ${{ github.workflow_sha || github.sha }}

      - name: Compute checkout ref
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          checkout_ref='${{ github.sha }}'
          checkout_sha='${{ github.sha }}'
          display_ref='${{ github.ref_name }}'
          run_all_lanes=false
          run_core_family=false
          run_attestation_family=false
          run_workflow_family=false
          run_ui_protocol_family=false
          run_docs_family=false
          files=()

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n '${{ inputs.ref }}' ]]; then
            checkout_ref='${{ inputs.ref }}'
            display_ref='${{ inputs.ref }}'
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            checkout_ref='${{ github.event.pull_request.head.sha }}'
            display_ref='${{ github.event.pull_request.head.ref }}'
          fi

          if [[ ! "${checkout_ref}" =~ ^[0-9a-f]{40}$ ]]; then
            git fetch --no-tags --depth=1 origin "${checkout_ref}"
            checkout_sha="$(git rev-parse FETCH_HEAD)"
          fi

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:heavy') }}" == 'true' ]]; then
              run_all_lanes=true
            fi

            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA...$HEAD_SHA")
          else
            run_all_lanes=true
          fi

          for f in "${files[@]}"; do
            case "$f" in
              codex-rs/Cargo.toml|codex-rs/Cargo.lock)
                run_core_family=true
                run_ui_protocol_family=true
                ;;
              codex-rs/core/src/memories/phase2.rs|codex-rs/core/src/memories/phase2_attestation_tests.rs|codex-rs/state/src/runtime/phase2_attestation.rs|codex-rs/state/migrations/0024_phase2_attestation_roots.sql)
                run_core_family=true
                run_attestation_family=true
                ;;
              codex-rs/cli/*|codex-rs/common/*|codex-rs/core/*|codex-rs/hooks/*|codex-rs/linux-sandbox/*|codex-rs/state/*|codex-rs/windows-sandbox-rs/*)
                run_core_family=true
                ;;
              codex-rs/code-mode/*)
                run_core_family=true
              ;;
              codex-rs/app-server/*|codex-rs/app-server-protocol/*|codex-rs/protocol/*|codex-rs/tui/*)
                run_ui_protocol_family=true
                ;;
              docs/carry-divergence-ledger.md|docs/downstream-regression-matrix.md|docs/downstream-tool-surface-matrix.md|docs/downstream.md)
                run_docs_family=true
                ;;
              .github/*|justfile)
                run_workflow_family=true
                ;;
            esac
          done

          files_json="$(printf '%s\n' "${files[@]}" | jq -R . | jq -sc .)"
          selection_meta="$(python3 .github/scripts/resolve_validation_plan.py heavy --event-name '${{ github.event_name }}' --requested-lane '${{ inputs.lane }}' --run-all-lanes "${run_all_lanes}" --run-core-family "${run_core_family}" --run-attestation-family "${run_attestation_family}" --run-workflow-family "${run_workflow_family}" --run-ui-protocol-family "${run_ui_protocol_family}" --run-docs-family "${run_docs_family}" --changed-files-json "${files_json}")"
          run_smoke_gate="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["run_smoke_gate"])')"
          smoke_gate_kind="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["smoke_gate_kind"])')"
          smoke_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["smoke_matrix"], separators=(",", ":")))')"
          smoke_light_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["smoke_light_matrix"], separators=(",", ":")))')"
          smoke_rust_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["smoke_rust_matrix"], separators=(",", ":")))')"
          smoke_heavy_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["smoke_heavy_matrix"], separators=(",", ":")))')"
          planned_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["planned_matrix"], separators=(",", ":")))')"
          selected_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_matrix"], separators=(",", ":")))')"
          selected_light_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_light_matrix"], separators=(",", ":")))')"
          selected_rust_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_rust_matrix"], separators=(",", ":")))')"
          selected_heavy_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_heavy_matrix"], separators=(",", ":")))')"
          selected_lane_ids_json="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.dumps(json.loads(os.environ["SELECTION_META"])["selected_lane_ids"], separators=(",", ":")))')"
          smoke_light_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["smoke_light_lane_count"])')"
          smoke_rust_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["smoke_rust_lane_count"])')"
          smoke_heavy_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["smoke_heavy_lane_count"])')"
          selected_light_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["selected_light_lane_count"])')"
          selected_rust_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["selected_rust_lane_count"])')"
          selected_heavy_lane_count="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["selected_heavy_lane_count"])')"
          light_max_parallel="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["light_max_parallel"])')"
          rust_max_parallel="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["rust_max_parallel"])')"
          heavy_max_parallel="$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["heavy_max_parallel"])')"
          planner_fingerprint="$(SELECTION_META="${selection_meta}" python3 -c 'import hashlib, json, os; payload = json.loads(os.environ["SELECTION_META"]); source = json.dumps({"requested_lane": "${{ inputs.lane }}", "run_smoke_gate": payload["run_smoke_gate"], "selected_lane_ids": payload["selected_lane_ids"]}, sort_keys=True, separators=(",", ":")); print(hashlib.sha256(source.encode("utf-8")).hexdigest()[:16])')"
          dedupe_reason=""
          run_selected_lanes="true"

          if [[ '${{ github.event_name }}' == 'pull_request' && '${{ github.event.action }}' == 'ready_for_review' ]]; then
            duplicate_run="$(
              gh api \
                -H 'Accept: application/vnd.github+json' \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/sedna-heavy-tests.yml/runs?event=pull_request&per_page=100" \
                --jq '
                  first(
                    .workflow_runs[]
                    | select(.id != ('"${GITHUB_RUN_ID}"' | tonumber))
                    | select(.head_sha == "'"${checkout_sha}"'")
                    | select(any(.pull_requests[]?; .number == ('"${{ github.event.pull_request.number }}"' | tonumber)))
                    | select((.status == "queued") or (.status == "in_progress") or (.conclusion == "success"))
                    | .html_url
                  ) // ""
                '
            )"
            if [[ -n "${duplicate_run}" ]]; then
              dedupe_reason="ready_for_review duplicate skipped; equivalent heavy evidence already exists for ${checkout_sha} (${duplicate_run})"
              run_smoke_gate="false"
              run_selected_lanes="false"
              smoke_gate_kind=""
              smoke_json='{"include":[]}'
              smoke_light_json='{"include":[]}'
              smoke_rust_json='{"include":[]}'
              smoke_heavy_json='{"include":[]}'
              planned_json='{"include":[]}'
              selected_json='{"include":[]}'
              selected_light_json='{"include":[]}'
              selected_rust_json='{"include":[]}'
              selected_heavy_json='{"include":[]}'
              selected_lane_ids_json='[]'
              smoke_light_lane_count='0'
              smoke_rust_lane_count='0'
              smoke_heavy_lane_count='0'
              selected_light_lane_count='0'
              selected_rust_lane_count='0'
              selected_heavy_lane_count='0'
            fi
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "checkout_sha=${checkout_sha}"
            echo "display_ref=${display_ref}"
            echo "planner_fingerprint=${planner_fingerprint}"
            echo "dedupe_reason=${dedupe_reason}"
            echo "smoke_gate_kind=${smoke_gate_kind}"
            echo "smoke_matrix=${smoke_json}"
            echo "smoke_light_matrix=${smoke_light_json}"
            echo "smoke_rust_matrix=${smoke_rust_json}"
            echo "smoke_heavy_matrix=${smoke_heavy_json}"
            echo "smoke_light_lane_count=${smoke_light_lane_count}"
            echo "smoke_rust_lane_count=${smoke_rust_lane_count}"
            echo "smoke_heavy_lane_count=${smoke_heavy_lane_count}"
            echo "run_smoke_gate=${run_smoke_gate}"
            echo "matrix_fail_fast=$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["matrix_fail_fast"])')"
            echo "continue_after_smoke_failure=$(SELECTION_META="${selection_meta}" python3 -c 'import json, os; print(json.loads(os.environ["SELECTION_META"])["continue_after_smoke_failure"])')"
            echo "run_selected_lanes=${run_selected_lanes}"
            echo "planned_matrix=${planned_json}"
            echo "selected_matrix=${selected_json}"
            echo "selected_light_matrix=${selected_light_json}"
            echo "selected_rust_matrix=${selected_rust_json}"
            echo "selected_heavy_matrix=${selected_heavy_json}"
            echo "selected_lane_ids=${selected_lane_ids_json}"
            echo "selected_light_lane_count=${selected_light_lane_count}"
            echo "selected_rust_lane_count=${selected_rust_lane_count}"
            echo "selected_heavy_lane_count=${selected_heavy_lane_count}"
            echo "light_max_parallel=${light_max_parallel}"
            echo "rust_max_parallel=${rust_max_parallel}"
            echo "heavy_max_parallel=${heavy_max_parallel}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### sedna-heavy-tests plan"
            echo
            echo "- Host workflow ref: \`${{ github.ref_name }}\`"
            echo "- Validated checkout ref: \`${checkout_ref}\`"
            echo "- Resolved checkout SHA: \`${checkout_sha}\`"
            echo "- Display ref: \`${display_ref}\`"
            echo "- Requested lane: \`${{ inputs.lane || 'auto' }}\`"
            echo "- Planner fingerprint: \`${planner_fingerprint}\`"
            if [[ -n "${dedupe_reason}" ]]; then
              echo "- Dedupe: ${dedupe_reason}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  smoke_light_lanes:
    name: Heavy preflight smoke (light)
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_light_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.light_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_light_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  smoke_rust_lanes:
    name: Heavy preflight smoke (rust)
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_rust_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_rust_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  smoke_heavy_lanes:
    name: Heavy preflight smoke (heavy)
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true' &&
        fromJson(needs.metadata.outputs.smoke_heavy_lane_count) > 0
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.heavy_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.smoke_heavy_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: smoke_gate
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  light_lanes:
    needs:
      - metadata
      - smoke_light_lanes
      - smoke_rust_lanes
      - smoke_heavy_lanes
    if: >-
      ${{
        always() &&
        fromJson(needs.metadata.outputs.selected_light_lane_count) > 0 &&
        needs.metadata.result == 'success' &&
        (
          needs.metadata.outputs.continue_after_smoke_failure == 'true' ||
          (needs.smoke_light_lanes.result == 'success' || needs.smoke_light_lanes.result == 'skipped') &&
          (needs.smoke_rust_lanes.result == 'success' || needs.smoke_rust_lanes.result == 'skipped') &&
          (needs.smoke_heavy_lanes.result == 'success' || needs.smoke_heavy_lanes.result == 'skipped')
        ) &&
        needs.metadata.outputs.run_selected_lanes == 'true'
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.light_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_light_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  rust_lanes:
    needs:
      - metadata
      - smoke_light_lanes
      - smoke_rust_lanes
      - smoke_heavy_lanes
    if: >-
      ${{
        always() &&
        fromJson(needs.metadata.outputs.selected_rust_lane_count) > 0 &&
        needs.metadata.result == 'success' &&
        (
          needs.metadata.outputs.continue_after_smoke_failure == 'true' ||
          (needs.smoke_light_lanes.result == 'success' || needs.smoke_light_lanes.result == 'skipped') &&
          (needs.smoke_rust_lanes.result == 'success' || needs.smoke_rust_lanes.result == 'skipped') &&
          (needs.smoke_heavy_lanes.result == 'success' || needs.smoke_heavy_lanes.result == 'skipped')
        ) &&
        needs.metadata.outputs.run_selected_lanes == 'true'
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.rust_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_rust_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  heavy_lanes:
    needs:
      - metadata
      - smoke_light_lanes
      - smoke_rust_lanes
      - smoke_heavy_lanes
    if: >-
      ${{
        always() &&
        fromJson(needs.metadata.outputs.selected_heavy_lane_count) > 0 &&
        needs.metadata.result == 'success' &&
        (
          needs.metadata.outputs.continue_after_smoke_failure == 'true' ||
          (needs.smoke_light_lanes.result == 'success' || needs.smoke_light_lanes.result == 'skipped') &&
          (needs.smoke_rust_lanes.result == 'success' || needs.smoke_rust_lanes.result == 'skipped') &&
          (needs.smoke_heavy_lanes.result == 'success' || needs.smoke_heavy_lanes.result == 'skipped')
        ) &&
        needs.metadata.outputs.run_selected_lanes == 'true'
      }}
    strategy:
      fail-fast: ${{ fromJson(needs.metadata.outputs.matrix_fail_fast) }}
      max-parallel: ${{ fromJson(needs.metadata.outputs.heavy_max_parallel) }}
      matrix: ${{ fromJson(needs.metadata.outputs.selected_heavy_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      lane_phase: downstream_lanes
      summary_title: ${{ matrix.lane_id }}
      status_class: ${{ matrix.status_class }}
      frontier_default: ${{ matrix.frontier_default }}
      setup_class: ${{ matrix.setup_class }}
      frontier_role: ${{ matrix.frontier_role }}
      summary_family: ${{ matrix.summary_family }}
      cost_class: ${{ matrix.cost_class }}
      run_command: ${{ matrix.run_command }}
      install_nextest: ${{ matrix.install_nextest }}

  summary:
    name: Sedna heavy-tests summary
    needs:
      - metadata
      - smoke_light_lanes
      - smoke_rust_lanes
      - smoke_heavy_lanes
      - light_lanes
      - rust_lanes
      - heavy_lanes
    if: >-
      ${{
        always() &&
        needs.metadata.result == 'success'
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download lane summary artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: validation-lane-summary-*
          path: ${{ runner.temp }}/validation-lane-summaries
          merge-multiple: true

      - name: Build heavy-test summary artifact
        shell: bash
        env:
          METADATA_RUN_SMOKE_GATE: ${{ needs.metadata.outputs.run_smoke_gate }}
          SMOKE_LIGHT_RESULT: ${{ needs.smoke_light_lanes.result || 'skipped' }}
          SMOKE_RUST_RESULT: ${{ needs.smoke_rust_lanes.result || 'skipped' }}
          SMOKE_HEAVY_RESULT: ${{ needs.smoke_heavy_lanes.result || 'skipped' }}
          LIGHT_RESULT: ${{ needs.light_lanes.result || 'skipped' }}
          RUST_RESULT: ${{ needs.rust_lanes.result || 'skipped' }}
          HEAVY_RESULT: ${{ needs.heavy_lanes.result || 'skipped' }}
          INPUT_LANE: ${{ inputs.lane }}
          RUN_SMOKE_GATE: ${{ needs.metadata.outputs.run_smoke_gate }}
          RUN_SELECTED_LANES: ${{ needs.metadata.outputs.run_selected_lanes }}
          SMOKE_GATE_KIND: ${{ needs.metadata.outputs.smoke_gate_kind }}
          MATRIX_FAIL_FAST: ${{ needs.metadata.outputs.matrix_fail_fast }}
          SUPERSESSION_KEY: ${{ inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          summary_file="${RUNNER_TEMP}/validation-summary.json"
          lane_set="${INPUT_LANE:-}"
          if [[ -z "${lane_set}" ]]; then
            lane_set="auto"
          fi
          if [[ "${lane_set}" == "all" ]]; then
            lane_summary="full heavy matrix"
            explicit_lanes=""
          elif [[ "${lane_set}" == "auto" ]]; then
            lane_summary="auto-selected heavy lanes"
            explicit_lanes=""
          else
            lane_summary="${lane_set}"
            explicit_lanes="${lane_set}"
          fi
          smoke_gate_result="skipped"
          if [[ "${METADATA_RUN_SMOKE_GATE}" == "true" ]]; then
            if [[ "${SMOKE_LIGHT_RESULT}" == "failure" || "${SMOKE_RUST_RESULT}" == "failure" || "${SMOKE_HEAVY_RESULT}" == "failure" ]]; then
              smoke_gate_result="failure"
            elif [[ "${SMOKE_LIGHT_RESULT}" == "cancelled" || "${SMOKE_RUST_RESULT}" == "cancelled" || "${SMOKE_HEAVY_RESULT}" == "cancelled" ]]; then
              smoke_gate_result="cancelled"
            elif [[ "${SMOKE_LIGHT_RESULT}" == "success" || "${SMOKE_RUST_RESULT}" == "success" || "${SMOKE_HEAVY_RESULT}" == "success" ]]; then
              smoke_gate_result="success"
            fi
          fi
          python3 .github/scripts/aggregate_validation_summary.py \
            --repo "${GITHUB_REPOSITORY}" \
            --host-ref "${{ github.ref_name }}" \
            --display-ref "${{ needs.metadata.outputs.display_ref }}" \
            --checkout-ref "${{ needs.metadata.outputs.checkout_ref }}" \
            --head-sha "${{ needs.metadata.outputs.checkout_sha }}" \
            --profile "heavy" \
            --lane-set "${lane_set}" \
            --profile-intent "heavy downstream validation" \
            --profile-notes "sedna-heavy-tests workflow summary" \
            --lane-summary "${lane_summary}" \
            --planned-matrix-json '${{ needs.metadata.outputs.planned_matrix }}' \
            --selected-lane-ids-json '${{ needs.metadata.outputs.selected_lane_ids }}' \
            --explicit-lanes "${explicit_lanes}" \
            --supersession-mode "manual" \
            --supersession-key "${SUPERSESSION_KEY}" \
            --notes-supplied "false" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --run-selected-lanes "${RUN_SELECTED_LANES}" \
            --run-smoke-gate "${RUN_SMOKE_GATE}" \
            --smoke-gate-kind "${SMOKE_GATE_KIND}" \
            --smoke-gate-result "${smoke_gate_result}" \
            --light-result "${LIGHT_RESULT}" \
            --rust-result "${RUST_RESULT}" \
            --heavy-result "${HEAVY_RESULT}" \
            --run-artifact "false" \
            --artifact-result "skipped" \
            --matrix-fail-fast "${MATRIX_FAIL_FAST}" \
            --lane-summary-dir "${RUNNER_TEMP}/validation-lane-summaries" \
            --output "${summary_file}"
          echo "SUMMARY_FILE=${summary_file}" >> "$GITHUB_ENV"

      - name: Upload heavy-test summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-summary
          path: ${{ env.SUMMARY_FILE }}
          overwrite: true
          retention-days: 3

      - name: Append heavy-test summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' "${SUMMARY_FILE}" >> "$GITHUB_STEP_SUMMARY"
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          summary = payload["summary"]
          first_failure = summary.get("first_failure")
          primary_blockers = summary.get("primary_blockers") or []
          secondary_findings = summary.get("secondary_findings") or []
          setup_rows = summary.get("setup_classes") or []

          print("### Sedna heavy-tests summary")
          print()
          print(f"- Overall conclusion: `{summary['overall_conclusion']}`")
          print(f"- Host workflow ref: `{payload['ref']['host_ref']}`")
          print(f"- Validated target ref: `{payload['ref']['display_ref']}`")
          print(f"- Checkout ref: `{payload['ref']['checkout_ref']}`")
          print(f"- Profile: `{payload['selection']['profile']}`")
          print(f"- Lane set: `{payload['selection']['lane_set']}`")
          if payload['selection'].get('lane_summary'):
              print(f"- Selection summary: `{payload['selection']['lane_summary']}`")
          print(f"- Selected lane count: `{summary['lane_count']}`")
          print(f"- Total recorded lane runtime (ms): `{summary.get('total_duration_ms', 0)}`")
          print(f"- Failed lanes: `{summary['failed_lane_count']}`")
          print(f"- Primary blocker families: `{len(primary_blockers)}`")
          print(f"- Additional failing lanes: `{len(secondary_findings)}`")
          if setup_rows:
              print(f"- Setup classes exercised: `{len(setup_rows)}`")
          if first_failure:
              print(f"- First surfaced blocker: `{first_failure['lane_id']}`")
              if first_failure.get('signal'):
                  print(f"- First blocker signal: `{first_failure['signal']}`")
          else:
              print("- First surfaced blocker: `none`")
          if setup_rows:
              print("- Setup class results:")
              for row in setup_rows:
                  print(
                      f"  - `{row['setup_class']}`: job `{row['job_result']}`, "
                      f"`{row['selected_lane_count']}` lanes, `{row['started_lane_count']}` started"
                  )
          phase_runtime = summary.get("phase_runtime_ms") or {}
          if phase_runtime:
              print("- Phase runtime totals (ms):")
              for phase, duration_ms in phase_runtime.items():
                  print(f"  - `{phase}`: `{duration_ms}`")
          top_slowest = summary.get("top_slowest_lanes") or []
          if top_slowest:
              print(f"- Top slow lanes (up to {len(top_slowest)}):")
              for lane in top_slowest:
                  lane_id = lane.get("lane_id") or "unknown"
                  lane_phase = lane.get("lane_phase") or "unknown"
                  duration_ms = lane.get("duration_ms")
                  print(f"  - `{lane_id}` (`{lane_phase}`): `{duration_ms}` ms")
          candidates = summary.get("candidate_next_slices") or []
          if candidates:
              print(f"- Frontier blocker count: `{len(candidates)}`")
              for candidate in candidates[:20]:
                  lane_id = candidate.get("lane_id") or "unknown"
                  signal = candidate.get("signal") or ""
                  if signal:
                      print(f"  - `{lane_id}`: `{signal}`")
                  else:
                      print(f"  - `{lane_id}`")
          if primary_blockers:
              print("- Primary blockers:")
              for item in primary_blockers[:20]:
                  signal = item.get("signal") or ""
                  if signal:
                      print(f"  - `{item['lane_id']}`: `{signal}`")
                  else:
                      print(f"  - `{item['lane_id']}`")
          if secondary_findings:
              print("- Secondary findings:")
              for item in secondary_findings[:20]:
                  signal = item.get("signal") or ""
                  if signal:
                      print(f"  - `{item['lane_id']}`: `{signal}`")
                  else:
                      print(f"  - `{item['lane_id']}`")
          PY
