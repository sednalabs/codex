      needs_just: ${{ matrix.needs_just }}
      needs_node: ${{ matrix.needs_node }}
      needs_nextest: ${{ matrix.needs_nextest }}
      needs_linux_build_deps: ${{ matrix.needs_linux_build_deps }}
      needs_dotslash: ${{ matrix.needs_dotslash }}
      needs_sccache: ${{ matrix.needs_sccache }}
      cache_policy: ${{ github.event_name == 'workflow_dispatch' && 'write-fallback' || 'restore-only' }}

  summary:
    name: Sedna heavy-tests summary
    needs:
      - metadata
      - smoke_workflow_lanes
      - smoke_node_lanes
      - smoke_rust_minimal_lanes
      - smoke_rust_integration_lanes
      - smoke_release_lanes
      - workflow_lanes
      - node_lanes
      - rust_minimal_lanes
      - rust_minimal_batches
      - rust_integration_lanes
      - rust_integration_batches
      - release_lanes_eager
      - release_lanes
    if: >-
      ${{
        always() &&
        needs.metadata.result == 'success'
      }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Download lane summary artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: validation-lane-summary-*
          path: ${{ runner.temp }}/validation-lane-summaries
          merge-multiple: true

      - name: Record Actions cache occupancy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cache_occupancy_file="${RUNNER_TEMP}/actions-cache-occupancy.json"
          cache_occupancy_markdown="${RUNNER_TEMP}/actions-cache-occupancy.md"
          python3 .github/scripts/report_actions_cache_occupancy.py \
            --repo "${GITHUB_REPOSITORY}" \
            --output "${cache_occupancy_file}" \
            --markdown-output "${cache_occupancy_markdown}"
          cat "${cache_occupancy_markdown}" >> "$GITHUB_STEP_SUMMARY"
          echo "CACHE_OCCUPANCY_FILE=${cache_occupancy_file}" >> "$GITHUB_ENV"

      - name: Build heavy-test summary artifact
        shell: bash
        env:
          METADATA_RUN_SMOKE_GATE: ${{ needs.metadata.outputs.run_smoke_gate }}
          SMOKE_WORKFLOW_RESULT: ${{ needs.smoke_workflow_lanes.result || 'skipped' }}
          SMOKE_NODE_RESULT: ${{ needs.smoke_node_lanes.result || 'skipped' }}
          SMOKE_RUST_MINIMAL_RESULT: ${{ needs.smoke_rust_minimal_lanes.result || 'skipped' }}
          SMOKE_RUST_INTEGRATION_RESULT: ${{ needs.smoke_rust_integration_lanes.result || 'skipped' }}
          SMOKE_RELEASE_RESULT: ${{ needs.smoke_release_lanes.result || 'skipped' }}
          WORKFLOW_RESULT: ${{ needs.workflow_lanes.result || 'skipped' }}
          NODE_RESULT: ${{ needs.node_lanes.result || 'skipped' }}
          RUST_MINIMAL_RESULT: ${{ needs.rust_minimal_lanes.result || 'skipped' }}
          RUST_MINIMAL_BATCH_RESULT: ${{ needs.rust_minimal_batches.result || 'skipped' }}
          RUST_INTEGRATION_RESULT: ${{ needs.rust_integration_lanes.result || 'skipped' }}
          RUST_INTEGRATION_BATCH_RESULT: ${{ needs.rust_integration_batches.result || 'skipped' }}
          RELEASE_EAGER_RESULT: ${{ needs.release_lanes_eager.result || 'skipped' }}
          RELEASE_RESULT: ${{ needs.release_lanes.result || 'skipped' }}
          INPUT_LANE: ${{ inputs.lane }}
          RUN_SMOKE_GATE: ${{ needs.metadata.outputs.run_smoke_gate }}
          RUN_SELECTED_LANES: ${{ needs.metadata.outputs.run_selected_lanes }}
          SMOKE_GATE_KIND: ${{ needs.metadata.outputs.smoke_gate_kind }}
          MATRIX_FAIL_FAST: ${{ needs.metadata.outputs.matrix_fail_fast }}
          RUST_BATCHING_MODE: ${{ needs.metadata.outputs.rust_batching_mode }}
          RUST_BATCHING_REASON: ${{ needs.metadata.outputs.rust_batching_reason }}
          SUPERSESSION_KEY: ${{ inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          summary_file="${RUNNER_TEMP}/validation-summary.json"
          lane_set="${INPUT_LANE:-}"
          if [[ -z "${lane_set}" ]]; then
            lane_set="auto"
          fi
          if [[ "${lane_set}" == "all" ]]; then
            lane_summary="full heavy matrix"
            explicit_lanes=""
          elif [[ "${lane_set}" == "auto" ]]; then
            lane_summary="auto-selected heavy lanes"
            explicit_lanes=""
          else
            lane_summary="${lane_set}"
            explicit_lanes="${lane_set}"
          fi
          smoke_gate_result="skipped"
          if [[ "${METADATA_RUN_SMOKE_GATE}" == "true" ]]; then
            if [[ "${SMOKE_WORKFLOW_RESULT}" == "failure" || "${SMOKE_NODE_RESULT}" == "failure" || "${SMOKE_RUST_MINIMAL_RESULT}" == "failure" || "${SMOKE_RUST_INTEGRATION_RESULT}" == "failure" || "${SMOKE_RELEASE_RESULT}" == "failure" ]]; then
              smoke_gate_result="failure"
            elif [[ "${SMOKE_WORKFLOW_RESULT}" == "cancelled" || "${SMOKE_NODE_RESULT}" == "cancelled" || "${SMOKE_RUST_MINIMAL_RESULT}" == "cancelled" || "${SMOKE_RUST_INTEGRATION_RESULT}" == "cancelled" || "${SMOKE_RELEASE_RESULT}" == "cancelled" ]]; then
              smoke_gate_result="cancelled"
            elif [[ "${SMOKE_WORKFLOW_RESULT}" == "success" || "${SMOKE_NODE_RESULT}" == "success" || "${SMOKE_RUST_MINIMAL_RESULT}" == "success" || "${SMOKE_RUST_INTEGRATION_RESULT}" == "success" || "${SMOKE_RELEASE_RESULT}" == "success" ]]; then
              smoke_gate_result="success"
            fi
          fi
          combined_result() {
            local first="$1"
            local second="$2"
            if [[ "${first}" == "failure" || "${second}" == "failure" ]]; then
              echo "failure"
            elif [[ "${first}" == "cancelled" || "${second}" == "cancelled" ]]; then
              echo "cancelled"
            elif [[ "${first}" == "success" || "${second}" == "success" ]]; then
              echo "success"
            else
              echo "skipped"
            fi
          }
          rust_minimal_result="$(combined_result "${RUST_MINIMAL_RESULT}" "${RUST_MINIMAL_BATCH_RESULT}")"
          rust_integration_result="$(combined_result "${RUST_INTEGRATION_RESULT}" "${RUST_INTEGRATION_BATCH_RESULT}")"
          release_result="$(combined_result "${RELEASE_RESULT}" "${RELEASE_EAGER_RESULT}")"
          python3 .github/scripts/aggregate_validation_summary.py \
            --repo "${GITHUB_REPOSITORY}" \
            --host-ref "${{ github.ref_name }}" \
            --display-ref "${{ needs.metadata.outputs.display_ref }}" \
            --checkout-ref "${{ needs.metadata.outputs.checkout_ref }}" \
            --head-sha "${{ needs.metadata.outputs.checkout_sha }}" \
            --profile "heavy" \
            --lane-set "${lane_set}" \
            --profile-intent "heavy downstream validation" \
            --profile-notes "sedna-heavy-tests workflow summary" \
            --lane-summary "${lane_summary}" \
            --planned-matrix-json '${{ needs.metadata.outputs.planned_matrix }}' \
            --selected-lane-ids-json '${{ needs.metadata.outputs.selected_lane_ids }}' \
            --explicit-lanes "${explicit_lanes}" \
            --supersession-mode "manual" \
            --supersession-key "${SUPERSESSION_KEY}" \
            --notes-supplied "false" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --run-selected-lanes "${RUN_SELECTED_LANES}" \
            --run-smoke-gate "${RUN_SMOKE_GATE}" \
            --smoke-gate-kind "${SMOKE_GATE_KIND}" \
            --smoke-gate-result "${smoke_gate_result}" \
            --workflow-result "${WORKFLOW_RESULT}" \
            --node-result "${NODE_RESULT}" \
            --rust-minimal-result "${rust_minimal_result}" \
            --rust-integration-result "${rust_integration_result}" \
            --release-result "${release_result}" \
            --run-artifact "false" \
            --artifact-result "skipped" \
            --matrix-fail-fast "${MATRIX_FAIL_FAST}" \
            --rust-batching-mode "${RUST_BATCHING_MODE}" \
            --rust-batching-reason "${RUST_BATCHING_REASON}" \
            --cache-occupancy-json "${CACHE_OCCUPANCY_FILE:-}" \
            --lane-summary-dir "${RUNNER_TEMP}/validation-lane-summaries" \
            --output "${summary_file}"
          echo "SUMMARY_FILE=${summary_file}" >> "$GITHUB_ENV"

      - name: Upload heavy-test summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-summary
          path: ${{ env.SUMMARY_FILE }}
          overwrite: true
          retention-days: 3

      - name: Append heavy-test summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' "${SUMMARY_FILE}" >> "$GITHUB_STEP_SUMMARY"
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          summary = payload["summary"]
          first_failure = summary.get("first_failure")
          primary_blockers = summary.get("primary_blockers") or []
          secondary_findings = summary.get("secondary_findings") or []
          setup_rows = summary.get("setup_classes") or []

          print("### Sedna heavy-tests summary")
          print()
          print(f"- Overall conclusion: `{summary['overall_conclusion']}`")
          print(f"- Profile: `{payload['selection']['profile']}`")
          print(f"- Lane set: `{payload['selection']['lane_set']}`")
          if payload['selection'].get('lane_summary'):
              print(f"- Selection summary: `{payload['selection']['lane_summary']}`")
          print(f"- Selected lane count: `{summary['lane_count']}`")
          print(f"- Total recorded lane runtime (ms): `{summary.get('total_duration_ms', 0)}`")
          print(f"- Failed lanes: `{summary['failed_lane_count']}`")
          print(f"- Rust batching: `{payload['selection'].get('rust_batching_mode') or 'off'}`")
          print(f"- Primary blocker families: `{len(primary_blockers)}`")
          print(f"- Additional failing lanes: `{len(secondary_findings)}`")
          if setup_rows:
              print(f"- Setup classes exercised: `{len(setup_rows)}`")
          if first_failure:
              print(f"- First surfaced blocker: `{first_failure['lane_id']}`")
              if first_failure.get('signal'):
                  print(f"- First blocker signal: `{first_failure['signal']}`")
          else:
              print("- First surfaced blocker: `none`")
          if setup_rows:
              print("- Setup class results:")
              for row in setup_rows:
                  print(
                      f"  - `{row['setup_class']}`: job `{row['job_result']}`, "
                      f"`{row['selected_lane_count']}` lanes, `{row['started_lane_count']}` started"
                  )
          phase_runtime = summary.get("phase_runtime_ms") or {}
          if phase_runtime:
              print("- Phase runtime totals (ms):")
              for phase, duration_ms in phase_runtime.items():
                  print(f"  - `{phase}`: `{duration_ms}`")
          top_slowest = summary.get("top_slowest_lanes") or []
          top_batches = summary.get("top_slowest_batches") or []
          if top_batches:
              print(f"- Top slow batches (up to {len(top_batches)}):")
              for batch in top_batches:
                  print(
                      f"  - `{batch.get('batch_id')}` (`{batch.get('setup_class')}`): "
                      f"`{batch.get('duration_ms')}` ms, `{len(batch.get('lane_ids') or [])}` lanes"
                  )
          if top_slowest:
              print(f"- Top slow lanes (up to {len(top_slowest)}):")
              for lane in top_slowest:
                  lane_id = lane.get("lane_id") or "unknown"
                  lane_phase = lane.get("lane_phase") or "unknown"
                  duration_ms = lane.get("duration_ms")
                  print(f"  - `{lane_id}` (`{lane_phase}`): `{duration_ms}` ms")
          candidates = summary.get("candidate_next_slices") or []
          if candidates:
              print(f"- Frontier blocker count: `{len(candidates)}`")
              for candidate in candidates[:20]:
                  lane_id = candidate.get("lane_id") or "unknown"
                  signal = candidate.get("signal") or ""
                  if signal:
                      print(f"  - `{lane_id}`: `{signal}`")
                  else:
                      print(f"  - `{lane_id}`")
          if primary_blockers:
              print("- Primary blockers:")
              for item in primary_blockers[:20]:
                  signal = item.get("signal") or ""
                  if signal:
                      print(f"  - `{item['lane_id']}`: `{signal}`")
                  else:
                      print(f"  - `{item['lane_id']}`")
          if secondary_findings:
              print("- Secondary findings:")
              for item in secondary_findings[:20]:
                  signal = item.get("signal") or ""
                  if signal:
                      print(f"  - `{item['lane_id']}`: `{signal}`")
                  else:
                      print(f"  - `{item['lane_id']}`")
          PY
