name: sedna-heavy-tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to validate
        required: false
        type: string
      lane:
        description: Downstream regression lane
        required: true
        type: choice
        options:
          - all
          - core-compile-smoke
          - core-carry-smoke
          - core-ledger-smoke
          - codex.core-startup-sync-targeted
          - codex.core-subagent-surface-targeted
          - codex.core-subagent-notification-contract-targeted
          - codex.core-subagent-notification-visibility-targeted
          - codex.core-multi-agent-orchestration-targeted
          - codex.core-persisted-subagent-descendants-targeted
          - codex.core-context-serialization-targeted
          - codex.state-spawn-lineage-contract-targeted
          - codex.app-server-protocol-test
          - codex.downstream-docs-check
          - downstream-ledger-seam
        default: all
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
  merge_group: {}
  schedule:
    - cron: "15 16 * * *"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve heavy-test checkout ref and lane selection
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.action != 'labeled' ||
        github.event.label.name == 'ci:heavy'
      }}
    runs-on: ubuntu-24.04
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      smoke_gate_kind: ${{ steps.meta.outputs.smoke_gate_kind }}
      run_smoke_gate: ${{ steps.meta.outputs.run_smoke_gate }}
      run_selected_lanes: ${{ steps.meta.outputs.run_selected_lanes }}
      selected_matrix: ${{ steps.meta.outputs.selected_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Compute checkout ref
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          checkout_ref='${{ github.sha }}'
          run_all_lanes=false
          run_core_family=false
          run_workflow_family=false
          run_ui_protocol_family=false
          run_docs_family=false
          files=()

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n '${{ inputs.ref }}' ]]; then
            checkout_ref='${{ inputs.ref }}'
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            checkout_ref='${{ github.event.pull_request.head.sha }}'
          fi

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:heavy') }}" == 'true' ]]; then
              run_all_lanes=true
            fi

            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA...$HEAD_SHA")
          elif [[ '${{ github.event_name }}' == 'push' ]]; then
            # Pushes to protected main should always run the full heavy matrix.
            run_all_lanes=true
          else
            run_all_lanes=true
          fi

          for f in "${files[@]}"; do
            case "$f" in
              codex-rs/Cargo.toml|codex-rs/Cargo.lock)
                run_core_family=true
                run_ui_protocol_family=true
                ;;
              codex-rs/cli/*|codex-rs/common/*|codex-rs/core/*|codex-rs/hooks/*|codex-rs/linux-sandbox/*|codex-rs/state/*|codex-rs/windows-sandbox-rs/*)
                run_core_family=true
                ;;
              codex-rs/code-mode/*)
                run_core_family=true
              ;;
              codex-rs/app-server/*|codex-rs/app-server-protocol/*|codex-rs/protocol/*|codex-rs/tui/*|codex-rs/tui_app_server/*)
                run_ui_protocol_family=true
                ;;
              docs/carry-divergence-ledger.md|docs/downstream-regression-matrix.md|docs/downstream-tool-surface-matrix.md|docs/downstream.md)
                run_docs_family=true
                ;;
              .github/*|justfile)
                run_workflow_family=true
                ;;
            esac
          done

          selected_json="$(
            CHECKOUT_EVENT='${{ github.event_name }}' \
            WORKFLOW_DISPATCH_LANE='${{ inputs.lane }}' \
            RUN_ALL_LANES="${run_all_lanes}" \
            RUN_CORE_FAMILY="${run_core_family}" \
            RUN_WORKFLOW_FAMILY="${run_workflow_family}" \
            RUN_UI_PROTOCOL_FAMILY="${run_ui_protocol_family}" \
            RUN_DOCS_FAMILY="${run_docs_family}" \
            python3 -c $'import json, os\nlane_specs = [\n    {"lane_id": "core-compile-smoke", "run_command": "just --justfile ../justfile core-compile-smoke", "group": "core"},\n    {"lane_id": "core-carry-smoke", "run_command": "just --justfile ../justfile core-carry-smoke", "group": "core"},\n    {"lane_id": "core-ledger-smoke", "run_command": "just --justfile ../justfile core-ledger-smoke", "group": "core"},\n    {"lane_id": "codex.core-startup-sync-targeted", "run_command": "just --justfile ../justfile core-startup-sync-targeted", "group": "core"},\n    {"lane_id": "codex.core-subagent-surface-targeted", "run_command": "just --justfile ../justfile core-subagent-surface-targeted", "group": "core"},\n    {"lane_id": "codex.core-subagent-notification-contract-targeted", "run_command": "just --justfile ../justfile core-subagent-notification-contract-targeted", "group": "core"},\n    {"lane_id": "codex.core-subagent-notification-visibility-targeted", "run_command": "just --justfile ../justfile core-subagent-notification-visibility-targeted", "group": "ui_protocol"},\n    {"lane_id": "codex.core-multi-agent-orchestration-targeted", "run_command": "just --justfile ../justfile core-multi-agent-orchestration-targeted", "group": "core"},\n    {"lane_id": "codex.core-persisted-subagent-descendants-targeted", "run_command": "just --justfile ../justfile core-persisted-subagent-descendants-targeted", "group": "core"},\n    {"lane_id": "codex.core-context-serialization-targeted", "run_command": "just --justfile ../justfile core-context-serialization-targeted", "group": "core"},\n    {"lane_id": "codex.state-spawn-lineage-contract-targeted", "run_command": "just --justfile ../justfile core-state-spawn-lineage-contract-targeted", "group": "core"},\n    {"lane_id": "codex.downstream-docs-check", "run_command": "just --justfile ../justfile downstream-docs-check", "group": "workflow"},\n    {"lane_id": "codex.app-server-protocol-test", "run_command": "cargo test --locked -p codex-app-server-protocol", "group": "ui_protocol"},\n    {"lane_id": "codex.downstream-docs-check", "run_command": "just --justfile ../justfile downstream-docs-check", "group": "docs"},\n    {"lane_id": "downstream-ledger-seam", "run_command": "just --justfile ../justfile downstream-ledger-seam", "group": "core"},\n]\nevent_name = os.environ["CHECKOUT_EVENT"]\nrequested_lane = os.environ.get("WORKFLOW_DISPATCH_LANE", "")\nrun_all = os.environ["RUN_ALL_LANES"] == "true"\nrun_core = os.environ["RUN_CORE_FAMILY"] == "true"\nrun_workflow = os.environ["RUN_WORKFLOW_FAMILY"] == "true"\nrun_ui = os.environ["RUN_UI_PROTOCOL_FAMILY"] == "true"\nrun_docs = os.environ["RUN_DOCS_FAMILY"] == "true"\npreferred_dispatch_groups = {\n    "codex.downstream-docs-check": "docs",\n}\nselected = []\nseen = set()\nfor spec in lane_specs:\n    if event_name == "workflow_dispatch" and requested_lane and requested_lane != "all":\n        if spec["lane_id"] != requested_lane:\n            continue\n        preferred_group = preferred_dispatch_groups.get(requested_lane)\n        if preferred_group and spec["group"] != preferred_group:\n            continue\n    elif not run_all:\n        if spec["group"] == "core" and not run_core:\n            continue\n        if spec["group"] == "workflow" and not run_workflow:\n            continue\n        if spec["group"] == "ui_protocol" and not run_ui:\n            continue\n        if spec["group"] == "docs" and not run_docs:\n            continue\n    if spec["lane_id"] in seen:\n        continue\n    seen.add(spec["lane_id"])\n    selected.append(spec)\nprint(json.dumps({"include": selected}, separators=(",", ":")))'
          )"
          smoke_gate_meta="$(
            SELECTED_JSON="${selected_json}" \
            CHECKOUT_EVENT='${{ github.event_name }}' \
            RUN_ALL_LANES="${run_all_lanes}" \
            python3 -c $'import json, os\nselected = json.loads(os.environ["SELECTED_JSON"])["include"]\nevent_name = os.environ["CHECKOUT_EVENT"]\nrun_all = os.environ["RUN_ALL_LANES"] == "true"\ngroups = {spec["group"] for spec in selected}\nhas_runtime_smoke_family = bool(groups & {"core", "ui_protocol"})\nhas_workflow_smoke_family = bool(groups & {"workflow", "docs"})\nrun_smoke_gate = (event_name != "workflow_dispatch" or run_all) and (has_runtime_smoke_family or has_workflow_smoke_family)\nsmoke_gate_kind = "runtime" if has_runtime_smoke_family else ("workflow_docs" if has_workflow_smoke_family else "")\nprint(json.dumps({"run_smoke_gate": "true" if run_smoke_gate else "false", "smoke_gate_kind": smoke_gate_kind}, separators=(",", ":")))'
          )"
          run_smoke_gate="$(SMOKE_GATE_META="${smoke_gate_meta}" python3 -c $'import json, os\nprint(json.loads(os.environ["SMOKE_GATE_META"])["run_smoke_gate"])')"
          smoke_gate_kind="$(SMOKE_GATE_META="${smoke_gate_meta}" python3 -c $'import json, os\nprint(json.loads(os.environ["SMOKE_GATE_META"])["smoke_gate_kind"])')"

          {
            echo "checkout_ref=${checkout_ref}"
            echo "smoke_gate_kind=${smoke_gate_kind}"
            echo "run_smoke_gate=${run_smoke_gate}"
            echo "run_selected_lanes=$([[ "${selected_json}" != '{"include":[]}' ]] && echo true || echo false)"
            echo "selected_matrix=${selected_json}"
          } >> "$GITHUB_OUTPUT"

  smoke_gate:
    name: Heavy preflight smoke
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.run_smoke_gate == 'true'
      }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ needs.metadata.outputs.smoke_gate_kind == 'workflow_docs' && 'codex.downstream-docs-check' || 'core-test-smoke' }}
      summary_title: ${{ needs.metadata.outputs.smoke_gate_kind == 'workflow_docs' && 'codex.downstream-docs-check' || 'core-test-smoke' }}
      run_command: ${{ needs.metadata.outputs.smoke_gate_kind == 'workflow_docs' && 'just --justfile ../justfile downstream-docs-check' || 'just --justfile ../justfile core-test-smoke' }}

  downstream_lanes:
    needs:
      - metadata
      - smoke_gate
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        (needs.smoke_gate.result == 'success' || needs.smoke_gate.result == 'skipped') &&
        needs.metadata.outputs.run_selected_lanes == 'true'
      }}
    strategy:
      fail-fast: ${{ github.event_name != 'push' || github.ref_name != 'main' }}
      max-parallel: 4
      matrix: ${{ fromJson(needs.metadata.outputs.selected_matrix) }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      summary_title: ${{ matrix.lane_id }}
      run_command: ${{ matrix.run_command }}
