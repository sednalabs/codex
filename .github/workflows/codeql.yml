name: "CodeQL Advanced"

on:
  push:
    branches: ["main", "upstream-main"]
  pull_request:
    branches: ["main", "upstream-main"]
  schedule:
    - cron: "21 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-advanced-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plan:
    name: CodeQL language router
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      languages: ${{ steps.plan.outputs.languages }}
      has_codeql_relevant_changes: ${{ steps.plan.outputs.has_codeql_relevant_changes }}
      run_all_languages: ${{ steps.plan.outputs.run_all_languages }}
      reason: ${{ steps.plan.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve comparison SHAs
        id: shas
        shell: bash
        run: |
          set -euo pipefail

          base_sha=""
          head_sha='${{ github.sha }}'

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
          fi

          {
            echo "base_sha=${base_sha}"
            echo "head_sha=${head_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve PR changed files via API
        id: pr_diff
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            function normalizePathList(files) {
              const paths = [];
              for (const file of files) {
                if (file.previous_filename) {
                  paths.push(file.previous_filename);
                }
                if (file.filename) {
                  paths.push(file.filename);
                }
              }
              return [...new Set(paths)];
            }

            function setJsonOutput(name, value) {
              core.setOutput(name, JSON.stringify(value));
            }

            try {
              const pullNumber = context.payload.pull_request.number;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
                per_page: 100,
              });
              const expectedChangedFiles = context.payload.pull_request.changed_files;
              if (Number.isFinite(expectedChangedFiles) && files.length !== expectedChangedFiles) {
                core.setOutput("needs_git_fallback", "true");
                core.setOutput(
                  "fallback_reason",
                  `pulls.listFiles returned ${files.length} of ${expectedChangedFiles} files`,
                );
                return;
              }

              setJsonOutput("changed_files_json", normalizePathList(files));
              core.setOutput("needs_git_fallback", "false");
              core.setOutput("fallback_reason", "");
            } catch (error) {
              core.warning(`failed to resolve PR diff via GitHub API: ${error.message}`);
              core.setOutput("needs_git_fallback", "true");
              core.setOutput("fallback_reason", error.message);
            }

      - name: Fetch history for git diff fallback
        if: ${{ steps.pr_diff.outputs.needs_git_fallback == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          base_sha='${{ steps.shas.outputs.base_sha }}'
          head_sha='${{ steps.shas.outputs.head_sha }}'
          head_repo='${{ github.event.pull_request.head.repo.clone_url }}'

          git fetch --no-tags --depth=1 origin "${base_sha}" || true
          git fetch --no-tags --depth=1 "${head_repo}" "${head_sha}" || true
          if ! git rev-parse --verify "${base_sha}^{commit}" >/dev/null 2>&1 ||
             ! git rev-parse --verify "${head_sha}^{commit}" >/dev/null 2>&1; then
            git fetch --no-tags --prune --unshallow origin || git fetch --no-tags --prune origin
          fi

      - name: Compute CodeQL language plan
        id: plan
        shell: bash
        env:
          CHANGED_FILES_JSON: ${{ steps.pr_diff.outputs.changed_files_json || '' }}
        run: |
          set -euo pipefail

          plan="$(python3 .github/scripts/resolve_codeql_plan.py \
            --repo-root "${GITHUB_WORKSPACE}" \
            --event-name '${{ github.event_name }}' \
            --base-sha '${{ steps.shas.outputs.base_sha }}' \
            --head-sha '${{ steps.shas.outputs.head_sha }}' \
            --changed-files-json "${CHANGED_FILES_JSON}")"

          PLAN_JSON="${plan}" python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          plan = json.loads(os.environ["PLAN_JSON"])
          for key, value in plan.items():
              print(f"{key}={value}")
          PY

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: plan
    if: ${{ needs.plan.outputs.has_codeql_relevant_changes == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchains for CodeQL
        if: ${{ matrix.language == 'rust' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          toolchains = {}
          for path in sorted(Path(".").glob("**/rust-toolchain*")):
              text = path.read_text(encoding="utf-8").strip()
              if text.startswith("["):
                  data = tomllib.loads(text)
                  toolchain = data["toolchain"]
                  channel = toolchain["channel"]
                  components = set(toolchain.get("components", []))
              else:
                  channel = text
                  components = set()
              components.add("rust-src")
              toolchains.setdefault(channel, set()).update(components)

          for channel, components in sorted(toolchains.items()):
              command = [
                  "rustup",
                  "toolchain",
                  "install",
                  channel,
                  "--profile",
                  "minimal",
                  "--no-self-update",
              ]
              for component in sorted(components):
                  command.extend(["--component", component])
              subprocess.run(command, check=True)
          PY

      - name: Restore Rust dependency cache for CodeQL
        if: ${{ matrix.language == 'rust' }}
        id: cache_codeql_rust_cargo_home_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml', 'tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain') }}
          restore-keys: |
            codeql-rust-cargo-home-v1-${{ runner.os }}-

      - name: Prefetch Rust dependencies for CodeQL
        if: ${{ matrix.language == 'rust' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --manifest-path codex-rs/Cargo.toml
          cargo fetch --locked --manifest-path tools/argument-comment-lint/Cargo.toml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Save Rust dependency cache for CodeQL
        if: ${{ always() && !cancelled() && matrix.language == 'rust' && steps.cache_codeql_rust_cargo_home_restore.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/upstream-main') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml', 'tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain') }}

  results:
    name: CodeQL required gate
    needs:
      - plan
      - analyze
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail

          echo "languages: ${{ needs.plan.outputs.languages }}"
          echo "full    : ${{ needs.plan.outputs.run_all_languages }}"
          echo "reason  : ${{ needs.plan.outputs.reason }}"
          echo "analyze : ${{ needs.analyze.result }}"

          if [[ '${{ needs.plan.result }}' != 'success' ]]; then
            echo 'CodeQL language router failed.'
            exit 1
          fi

          if [[ '${{ needs.plan.outputs.has_codeql_relevant_changes }}' != 'true' ]]; then
            echo 'No CodeQL-relevant changes -> analysis not required.'
            exit 0
          fi

          if [[ '${{ needs.analyze.result }}' != 'success' ]]; then
            echo 'CodeQL analysis failed.'
            exit 1
          fi
