name: "CodeQL Advanced"

on:
  push:
    branches: ["main", "upstream-main"]
  pull_request:
    branches: ["main", "upstream-main"]
  schedule:
    - cron: "21 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            config_file: ./.codeql-runtime/codeql-actions.yml
          - language: c-cpp
            build-mode: none
            config_file: ./.github/codeql/codeql-config.yml
          - language: javascript-typescript
            build-mode: none
            config_file: ./.github/codeql/codeql-config.yml
          - language: python
            build-mode: none
            config_file: ./.github/codeql/codeql-config.yml
          - language: rust
            build-mode: none
            config_file: ./.github/codeql/codeql-config.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchains for CodeQL
        if: ${{ matrix.language == 'rust' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          toolchains = {}
          for path in sorted(Path(".").glob("**/rust-toolchain*")):
              text = path.read_text(encoding="utf-8").strip()
              if text.startswith("["):
                  data = tomllib.loads(text)
                  toolchain = data["toolchain"]
                  channel = toolchain["channel"]
              else:
                  channel = text
              toolchains.setdefault(channel, set()).add("rust-src")

          for channel, components in sorted(toolchains.items()):
              command = [
                  "rustup",
                  "toolchain",
                  "install",
                  channel,
                  "--profile",
                  "minimal",
                  "--no-self-update",
              ]
              for component in sorted(components):
                  command.extend(["--component", component])
              subprocess.run(command, check=True)
          PY

      - name: Restore Rust dependency cache for CodeQL
        if: ${{ matrix.language == 'rust' }}
        id: cache_codeql_rust_cargo_home_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml', 'tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain') }}
          restore-keys: |
            codeql-rust-cargo-home-v1-${{ runner.os }}-

      - name: Record Rust cache telemetry for CodeQL
        if: ${{ matrix.language == 'rust' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### CodeQL Rust cache telemetry"
            echo "- Cargo cache hit: ${{ steps.cache_codeql_rust_cargo_home_restore.outputs.cache-hit || 'false' }}"
            echo "- Cargo cache key: \`codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml', 'tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain') }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prefetch Rust dependencies for CodeQL
        if: ${{ matrix.language == 'rust' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --manifest-path codex-rs/Cargo.toml
          cargo fetch --locked --manifest-path tools/argument-comment-lint/Cargo.toml

      - name: Prepare Actions CodeQL query pack config
        if: ${{ matrix.language == 'actions' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .codeql-runtime
          pack_path="./.github/codeql/actions-workflow-security"

          if [[ '${{ github.event_name }}' == 'pull_request' &&
            '${{ github.event.pull_request.head.repo.full_name }}' != '${{ github.repository }}' ]]; then
            trusted_root="${GITHUB_WORKSPACE}/.codeql-runtime/trusted-base"
            trusted_pack="./.codeql-runtime/trusted-base/.github/codeql/actions-workflow-security"
            mkdir -p "${trusted_root}"

            if git fetch --no-tags --depth=1 origin '${{ github.event.pull_request.base.sha }}' &&
              git archive '${{ github.event.pull_request.base.sha }}' .github/codeql/actions-workflow-security |
                tar -x -C "${trusted_root}"; then
              pack_path="${trusted_pack}"
            else
              echo "::warning title=CodeQL Actions query pack bootstrap::Trusted base query pack was unavailable; using the checked-out pack for this run."
            fi
          fi

          {
            echo "name: codex-codeql-actions-runtime"
            echo
            echo "queries:"
            echo "  - uses: security-and-quality"
            echo "  - uses: ${pack_path}"
            echo
            echo "threat-models: local"
          } > .codeql-runtime/codeql-actions.yml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config_file }}
          dependency-caching: ${{ github.event_name == 'pull_request' && 'restore' || 'full' }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Save Rust dependency cache for CodeQL
        if: ${{ always() && !cancelled() && matrix.language == 'rust' && steps.cache_codeql_rust_cargo_home_restore.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/upstream-main') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml', 'tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain') }}

  results:
    name: CodeQL required gate
    needs:
      - analyze
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    steps:
      - name: Report CodeQL timing
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "### CodeQL timing" >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[]
              | select(.name | test("^(Analyze \\(|CodeQL required gate)"))
              | "- \(.name): \(.status)/\(.conclusion // "") started=\(.started_at) completed=\(.completed_at // "")"' \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail

          echo "analyze : ${{ needs.analyze.result }}"

          if [[ '${{ needs.analyze.result }}' != 'success' ]]; then
            echo 'CodeQL analysis failed.'
            exit 1
          fi
