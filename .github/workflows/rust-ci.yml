name: rust-ci
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      platform_scope:
        description: Downstream platform coverage to run
        required: false
        type: choice
        options:
          - linux-x86_64-only
        default: linux-x86_64-only
  schedule:
    - cron: "15 18 * * *"

permissions:
  contents: read
  checks: read

jobs:
  matrix_plan:
    name: Resolve platform scope
    runs-on: ubuntu-24.04
    outputs:
      argument_comment_lint_matrix: ${{ steps.plan.outputs.argument_comment_lint_matrix }}
    steps:
      - name: Compute platform matrices
        id: plan
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          # Downstream heavy validation is intentionally Linux x86_64 only for now.
          linux_x86_64_only = [
              {
                  "name": "Linux x86_64",
                  "runner": "ubuntu-24.04",
                  "timeout_minutes": 30,
              }
          ]

          payload = json.dumps({"include": linux_x86_64_only}, separators=(",", ":"))
          print(f"argument_comment_lint_matrix={payload}")
          PY

  # --- Detect what changed so the fast PR workflow only runs relevant jobs ----
  changed:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      argument_comment_lint: ${{ steps.detect.outputs.argument_comment_lint }}
      argument_comment_lint_package: ${{ steps.detect.outputs.argument_comment_lint_package }}
      codex: ${{ steps.detect.outputs.codex }}
      workflows: ${{ steps.detect.outputs.workflows }}
      has_relevant_changes: ${{ steps.detect.outputs.has_relevant_changes }}
      validation_mode: ${{ steps.detect.outputs.validation_mode }}
      run_general: ${{ steps.detect.outputs.run_general }}
      run_cargo_shear: ${{ steps.detect.outputs.run_cargo_shear }}
      run_argument_comment_lint_package: ${{ steps.detect.outputs.run_argument_comment_lint_package }}
      run_argument_comment_lint_prebuilt: ${{ steps.detect.outputs.run_argument_comment_lint_prebuilt }}
      run_incremental_validation: ${{ steps.detect.outputs.run_incremental_validation }}
      incremental_profile: ${{ steps.detect.outputs.incremental_profile }}
      incremental_lane_set: ${{ steps.detect.outputs.incremental_lane_set }}
      incremental_lanes: ${{ steps.detect.outputs.incremental_lanes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Resolve comparison SHAs
        id: shas
        shell: bash
        run: |
          set -euo pipefail

          base_sha=""
          head_sha='${{ github.sha }}'
          before_sha=""

          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            before_sha="$(jq -r '.before // ""' "${GITHUB_EVENT_PATH}")"
          fi

          {
            echo "base_sha=${base_sha}"
            echo "head_sha=${head_sha}"
            echo "before_sha=${before_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Check previous required result on follow-up head
        id: previous_required
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}
        uses: actions/github-script@v9
        env:
          BEFORE_SHA: ${{ steps.shas.outputs.before_sha }}
        with:
          script: |
            const ref = process.env.BEFORE_SHA;
            if (!ref) {
              core.setOutput("previous_green_required", "false");
              return;
            }

            try {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
                per_page: 100,
              });
              const ok = data.check_runs.some(
                (run) =>
                  run.name === "CI results (required)" &&
                  run.conclusion === "success",
              );
              core.setOutput("previous_green_required", ok ? "true" : "false");
            } catch (error) {
              core.warning(`failed to inspect prior required result: ${error.message}`);
              core.setOutput("previous_green_required", "false");
            }

      - name: Detect changed paths and rust-ci mode
        id: detect
        shell: bash
        env:
          EVENT_ACTION: ${{ github.event.action || '' }}
          PREVIOUS_GREEN_REQUIRED: ${{ steps.previous_required.outputs.previous_green_required || 'false' }}
        run: |
          set -euo pipefail

          plan="$(python3 .github/scripts/resolve_rust_ci_mode.py \
            --repo-root "${GITHUB_WORKSPACE}" \
            --event-name '${{ github.event_name }}' \
            --event-action "${EVENT_ACTION}" \
            --base-sha '${{ steps.shas.outputs.base_sha }}' \
            --head-sha '${{ steps.shas.outputs.head_sha }}' \
            --before-sha '${{ steps.shas.outputs.before_sha }}' \
            --previous-green-required "${PREVIOUS_GREEN_REQUIRED}")"

          PLAN_JSON="${plan}" python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          plan = json.loads(os.environ["PLAN_JSON"])
          for key, value in plan.items():
              print(f"{key}={value}")
          PY

  incremental_validation:
    name: Incremental targeted validation
    needs: changed
    if: ${{ needs.changed.outputs.run_incremental_validation == 'true' }}
    uses: ./.github/workflows/validation-lab.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      profile: ${{ needs.changed.outputs.incremental_profile }}
      lane_set: ${{ needs.changed.outputs.incremental_lane_set }}
      lanes: ${{ needs.changed.outputs.incremental_lanes }}
      artifact_build: false
      supersession_mode: auto
      notes: rust-ci incremental follow-up validation

  planner_fixtures:
    name: Planner fixtures
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.workflows == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check planner script syntax
        run: python3 -m py_compile .github/scripts/resolve_validation_plan.py .github/scripts/resolve_rust_ci_mode.py .github/scripts/test_ci_planners.py
      - name: Run planner fixtures
        run: python3 -m unittest discover -s .github/scripts -p 'test_ci_planners.py'

  # --- Fast Cargo-native PR checks -------------------------------------------
  general:
    name: Format / etc
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.run_general == 'true' }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt -- --config imports_granularity=Item --check

  cargo_shear:
    name: cargo shear
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.run_cargo_shear == 'true' }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - uses: taiki-e/install-action@7a4939c09608b2a1986b484eca1d16fd0db8ebef # v2
        with:
          tool: cargo-shear
          version: 1.5.1
      - name: cargo shear
        run: cargo shear

  argument_comment_lint_package:
    name: Argument comment lint package
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.run_argument_comment_lint_package == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - name: Install nightly argument-comment-lint toolchain
        shell: bash
        run: |
          rustup toolchain install nightly-2025-09-18 \
            --profile minimal \
            --component llvm-tools-preview \
            --component rustc-dev \
            --component rust-src \
            --no-self-update
          rustup default nightly-2025-09-18
      - name: Cache cargo-dylint tooling
        id: cargo_dylint_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/bin/cargo-dylint
            ~/.cargo/bin/dylint-link
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: argument-comment-lint-${{ runner.os }}-${{ hashFiles('tools/argument-comment-lint/Cargo.lock', 'tools/argument-comment-lint/rust-toolchain', '.github/workflows/rust-ci.yml', '.github/workflows/rust-ci-full.yml') }}
      - name: Install cargo-dylint tooling
        if: ${{ steps.cargo_dylint_cache.outputs.cache-hit != 'true' }}
        run: cargo install --locked cargo-dylint dylint-link
      - name: Check Python wrapper syntax
        run: python3 -m py_compile tools/argument-comment-lint/wrapper_common.py tools/argument-comment-lint/run.py tools/argument-comment-lint/run-prebuilt-linter.py tools/argument-comment-lint/test_wrapper_common.py
      - name: Test Python wrapper helpers
        run: python3 -m unittest discover -s tools/argument-comment-lint -p 'test_*.py'
      - name: Test argument comment lint package
        working-directory: tools/argument-comment-lint
        run: cargo test

  argument_comment_lint_prebuilt:
    name: Argument comment lint - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs:
      - matrix_plan
      - changed
    if: ${{ needs.changed.outputs.run_argument_comment_lint_prebuilt == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix_plan.outputs.argument_comment_lint_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-bazel-ci
        with:
          target: ${{ runner.os }}
          install-test-prereqs: true
      - name: Install Linux sandbox build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - name: Run argument comment lint on codex-rs via Bazel
        if: ${{ runner.os != 'Windows' }}
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          bazel_extra_args=()
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            bazel_extra_args+=(--jobs=8 --loading_phase_threads=8)
          fi
          bazel_targets=()
          while IFS= read -r bazel_target; do
            bazel_targets+=("${bazel_target}")
          done < <(./tools/argument-comment-lint/list-bazel-targets.sh)
          ./.github/scripts/run-bazel-ci.sh \
            -- \
            build \
            --config=argument-comment-lint \
            "${bazel_extra_args[@]}" \
            --keep_going \
            "--build_metadata=COMMIT_SHA=${GITHUB_SHA}" \
            -- \
            "${bazel_targets[@]}"
      - name: Run argument comment lint on codex-rs via Bazel
        if: ${{ runner.os == 'Windows' }}
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          ./.github/scripts/run-argument-comment-lint-bazel.sh \
            --config=argument-comment-lint \
            --platforms=//:local_windows \
            --keep_going \
            "--build_metadata=COMMIT_SHA=${GITHUB_SHA}"

  # --- Gatherer job that you mark as the ONLY required status -----------------
  results:
    name: CI results (required)
    needs:
      [
        changed,
        matrix_plan,
        incremental_validation,
        planner_fixtures,
        general,
        cargo_shear,
        argument_comment_lint_package,
        argument_comment_lint_prebuilt,
      ]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize
        shell: bash
        run: |
          echo "mode   : ${{ needs.changed.outputs.validation_mode }}"
          echo "argpkg : ${{ needs.argument_comment_lint_package.result }}"
          echo "arglint: ${{ needs.argument_comment_lint_prebuilt.result }}"
          echo "planner: ${{ needs.planner_fixtures.result }}"
          echo "general: ${{ needs.general.result }}"
          echo "shear  : ${{ needs.cargo_shear.result }}"
          echo "incr   : ${{ needs.incremental_validation.result }}"

          # If nothing relevant changed (PR touching only root README, etc.),
          # declare success regardless of other jobs.
          if [[ '${{ needs.changed.outputs.has_relevant_changes }}' != 'true' ]]; then
            echo 'No relevant changes -> CI not required.'
            exit 0
          fi

          if [[ '${{ needs.changed.outputs.run_argument_comment_lint_package }}' == 'true' ]]; then
            [[ '${{ needs.argument_comment_lint_package.result }}' == 'success' ]] || { echo 'argument_comment_lint_package failed'; exit 1; }
          fi

          if [[ '${{ needs.changed.outputs.run_argument_comment_lint_prebuilt }}' == 'true' ]]; then
            [[ '${{ needs.argument_comment_lint_prebuilt.result }}' == 'success' ]] || { echo 'argument_comment_lint_prebuilt failed'; exit 1; }
          fi

          if [[ '${{ needs.changed.outputs.workflows }}' == 'true' ]]; then
            [[ '${{ needs.planner_fixtures.result }}' == 'success' ]] || { echo 'planner_fixtures failed'; exit 1; }
          fi

          if [[ '${{ needs.changed.outputs.run_general }}' == 'true' ]]; then
            [[ '${{ needs.general.result }}' == 'success' ]] || { echo 'general failed'; exit 1; }
          fi

          if [[ '${{ needs.changed.outputs.run_cargo_shear }}' == 'true' ]]; then
            [[ '${{ needs.cargo_shear.result }}' == 'success' ]] || { echo 'cargo_shear failed'; exit 1; }
          fi

          if [[ '${{ needs.changed.outputs.run_incremental_validation }}' == 'true' ]]; then
            [[ '${{ needs.incremental_validation.result }}' == 'success' ]] || { echo 'incremental_validation failed'; exit 1; }
          fi
