name: rust-ci
on:
  pull_request: {}
  merge_group: {}
  push:
    branches:
      - main
      - upstream-main
  workflow_dispatch:

concurrency:
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ (github.ref_name == 'main' || github.ref_name == 'upstream-main') && format('::{0}', github.run_id) || '' }}
  cancel-in-progress: ${{ github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

jobs:
  changed:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      argument_comment_lint: ${{ steps.detect.outputs.argument_comment_lint }}
      argument_comment_lint_package: ${{ steps.detect.outputs.argument_comment_lint_package }}
      ci_surface: ${{ steps.detect.outputs.ci_surface }}
      ci_runtime_surface: ${{ steps.detect.outputs.ci_runtime_surface }}
      codex: ${{ steps.detect.outputs.codex }}
      downstream_smoke: ${{ steps.detect.outputs.downstream_smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths (no external action)
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA...$HEAD_SHA")
          else
            files=("codex-rs/force" ".github/force")
          fi

          codex=false
          ci_surface=false
          ci_runtime_surface=false
          downstream_smoke=false
          argument_comment_lint=false
          argument_comment_lint_package=false

          for f in "${files[@]}"; do
            [[ $f == codex-rs/* ]] && codex=true
            if [[ $f == .github/* || $f == justfile ]]; then
              ci_surface=true
            fi
            if [[ $f == .github/workflows/* ]]; then
              # escalate only if workflow touches runtime-relevant areas
              if grep -Eq 'cargo|rust-toolchain|build|test|install|setup' "$f" 2>/dev/null; then
                ci_runtime_surface=true
              fi
            fi
            [[ $f == codex-rs/* || $f == justfile || $f == docs/downstream.md || $f == docs/carry-divergence-ledger.md || $f == docs/downstream-regression-matrix.md || $f == docs/downstream-tool-surface-matrix.md || $f == .github/* ]] && downstream_smoke=true
            [[ $f == codex-rs/* || $f == tools/argument-comment-lint/* ]] && argument_comment_lint=true
            [[ $f == tools/argument-comment-lint/* ]] && argument_comment_lint_package=true
          done

          {
            echo "argument_comment_lint=$argument_comment_lint"
            echo "argument_comment_lint_package=$argument_comment_lint_package"
            echo "ci_surface=$ci_surface"
            echo "ci_runtime_surface=$ci_runtime_surface"
            echo "codex=$codex"
            echo "downstream_smoke=$downstream_smoke"
          } >> "$GITHUB_OUTPUT"

  workflow_validation:
    name: Workflow validation
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.ci_surface == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.8
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" | tar -xz actionlint
          sudo install actionlint /usr/local/bin/actionlint
      - name: Validate touched workflow files
        shell: bash
        run: |
          set -euo pipefail
          files=()
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            while IFS= read -r file; do
              if [[ $file == .github/workflows/* && -f $file ]]; then
                files+=("$file")
              fi
            done < <(git diff --name-only --diff-filter=AM --no-renames "$BASE_SHA...$HEAD_SHA")
          fi
          if ((${#files[@]} == 0)); then
            while IFS= read -r file; do
              files+=("$file")
            done < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          fi
          if ((${#files[@]} == 0)); then
            echo "No workflow files to validate."
            exit 0
          fi
          actionlint "${files[@]}"

  general:
    name: Format / etc
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.codex == 'true' || needs.changed.outputs.ci_surface == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt -- --config imports_granularity=Item --check

  cargo_shear:
    name: cargo shear
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.codex == 'true' || needs.changed.outputs.ci_surface == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2
        with:
          tool: cargo-shear
          version: 1.5.1
      - name: cargo shear
        run: cargo shear

  lint_build:
    name: Lint/Build — ${{ matrix.runner }} - ${{ matrix.target }}${{ matrix.profile == 'release' && ' (release)' || '' }}
    runs-on: ${{ (github.repository_owner == 'openai' && (matrix.runs_on || matrix.runner)) || matrix.runner_fallback || matrix.runner }}
    needs: changed
    if: ${{ needs.changed.outputs.codex == 'true' || needs.changed.outputs.ci_runtime_surface == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: ${{ github.event_name != 'push' }}
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            profile: dev

  tests:
    name: Tests — ${{ matrix.runner }} - ${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: changed
    if: ${{ needs.changed.outputs.codex == 'true' || needs.changed.outputs.ci_runtime_surface == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - run: cargo test --all-features

  downstream_smoke:
    name: Downstream smoke
    needs: changed
    if: ${{ needs.changed.outputs.downstream_smoke == 'true' || github.event_name == 'push' }}
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      lane_id: core-test-smoke
      summary_title: core-test-smoke
      run_command: just --justfile ../justfile core-test-smoke

  results:
    name: CI results (required)
    needs: [changed, workflow_validation, general, cargo_shear, lint_build, tests, downstream_smoke]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - run: echo "CI completed"
