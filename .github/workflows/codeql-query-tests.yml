name: codeql-query-tests

on:
  pull_request:
    paths:
      - ".github/codeql/rust-computer-use-contract/**"
      - ".github/workflows/codeql-query-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-query-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rust-computer-use-contract:
    name: Rust computer-use contract query tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up CodeQL
        id: setup-codeql
        uses: github/codeql-action/setup-codeql@v4

      - name: Install Rust computer-use query pack dependencies
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" pack install .github/codeql/rust-computer-use-contract

      - name: Compile Rust computer-use contract queries
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" query compile \
            --search-path .github/codeql \
            .github/codeql/rust-computer-use-contract/queries/*.ql

      - name: Run Rust computer-use contract query tests
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" test run \
            --search-path .github/codeql \
            .github/codeql/rust-computer-use-contract/test
