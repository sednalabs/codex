name: cancel-pr-runs

on:
  pull_request_target:
    types:
      - closed

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    name: Cancel active runs for closed PR
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stale runs for the closed PR
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const activeStatuses = [
              'queued',
              'in_progress',
              'requested',
              'waiting',
              'pending',
              'action_required',
            ];
            const headBranch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const baseBranch = context.payload.pull_request.base.ref;
            const prNumber = context.payload.pull_request.number;
            const currentRepo = `${owner}/${repo}`;
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const protectedBranches = new Set(
              ['main', 'upstream-main', baseBranch].filter(Boolean),
            );
            const mayCancelHeadPushRuns =
              headRepo === currentRepo && !protectedBranches.has(headBranch);

            const candidates = [];
            for (const status of activeStatuses) {
              const pullRequestRuns = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  event: 'pull_request',
                  status,
                  per_page: 100,
                },
              );
              candidates.push(...pullRequestRuns);

              if (mayCancelHeadPushRuns) {
                const pushRuns = await github.paginate(
                  github.rest.actions.listWorkflowRunsForRepo,
                  {
                    owner,
                    repo,
                    branch: headBranch,
                    event: 'push',
                    status,
                    per_page: 100,
                  },
                );
                candidates.push(...pushRuns);
              }
            }

            if (!mayCancelHeadPushRuns) {
              core.info(
                `Skipping push-run cancellation for ${headRepo}:${headBranch}; only stale PR runs will be cancelled.`,
              );
            }

            const seenRunIds = new Set();
            const runsToCancel = candidates.filter((run) => {
              if (seenRunIds.has(run.id)) {
                return false;
              }
              seenRunIds.add(run.id);

              if (run.event !== 'pull_request' && run.event !== 'push') {
                return false;
              }

              const matchesPullRequest =
                run.event === 'pull_request' &&
                Array.isArray(run.pull_requests) &&
                run.pull_requests.some((pr) => pr.number === prNumber);
              const matchesBranchPush =
                mayCancelHeadPushRuns &&
                run.event === 'push' &&
                run.head_branch === headBranch &&
                run.head_sha === headSha;

              return matchesPullRequest || matchesBranchPush;
            });

            if (runsToCancel.length === 0) {
              core.info(
                `No active runs found for PR #${prNumber} on ${headBranch} @ ${headSha}.`,
              );
              core.info(
                `Post-merge push runs on ${baseBranch} are intentionally left running as the authoritative branch proof.`,
              );
              return;
            }

            for (const run of runsToCancel) {
              core.info(
                `Cancelling ${run.name} (#${run.run_number}, ${run.event}, id ${run.id}).`,
              );
              try {
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              } catch (error) {
                core.warning(`Failed to cancel run ${run.id}: ${error.message}`);
              }
            }

            core.info(
              `Post-merge push runs on ${baseBranch} are intentionally left running as the authoritative branch proof.`,
            );

            await core.summary
              .addHeading(`Cancelled ${runsToCancel.length} run(s) for PR #${prNumber}`)
              .addList(
                runsToCancel.map(
                  (run) => `${run.name} (#${run.run_number}, ${run.event}, id ${run.id})`,
                ),
              )
              .write();
