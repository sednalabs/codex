name: cancel-pr-runs

on:
  pull_request_target:
    types:
      - closed

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    name: Cancel active PR workflow runs
    runs-on: ubuntu-latest
    steps:
      - name: Cancel active runs for the closed PR head commit
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const activeStatuses = [
              'queued',
              'in_progress',
              'requested',
              'waiting',
              'pending',
              'action_required',
            ];
            const headBranch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const prNumber = context.payload.pull_request.number;

            const candidates = [];
            for (const status of activeStatuses) {
              const pullRequestRuns = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  event: 'pull_request',
                  status,
                  per_page: 100,
                },
              );
              const pushRuns = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  branch: headBranch,
                  event: 'push',
                  status,
                  per_page: 100,
                },
              );
              candidates.push(...pullRequestRuns, ...pushRuns);
            }

            const seenRunIds = new Set();
            const runsToCancel = candidates.filter((run) => {
              if (seenRunIds.has(run.id)) {
                return false;
              }
              seenRunIds.add(run.id);

              if (run.event !== 'pull_request' && run.event !== 'push') {
                return false;
              }

              const matchesPullRequest =
                run.event === 'pull_request' &&
                Array.isArray(run.pull_requests) &&
                run.pull_requests.some((pr) => pr.number === prNumber);
              const matchesBranchPush =
                run.event === 'push' &&
                run.head_branch === headBranch &&
                run.head_sha === headSha;

              return matchesPullRequest || matchesBranchPush;
            });

            if (runsToCancel.length === 0) {
              core.info(
                `No active runs found for PR #${prNumber} on ${headBranch} @ ${headSha}.`,
              );
              return;
            }

            for (const run of runsToCancel) {
              core.info(
                `Cancelling ${run.name} (#${run.run_number}, ${run.event}, id ${run.id}).`,
              );
              try {
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              } catch (error) {
                core.warning(`Failed to cancel run ${run.id}: ${error.message}`);
              }
            }

            await core.summary
              .addHeading(`Cancelled ${runsToCancel.length} run(s) for PR #${prNumber}`)
              .addList(
                runsToCancel.map(
                  (run) => `${run.name} (#${run.run_number}, ${run.event}, id ${run.id})`,
                ),
              )
              .write();
