name: sync-models-json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      upstream_sha: ${{ steps.upstream.outputs.upstream_sha }}
      upstream_short_sha: ${{ steps.upstream.outputs.upstream_short_sha }}
    env:
      MODELS_JSON_PATH: codex-rs/models-manager/models.json

    steps:
      - uses: actions/checkout@v6

      - name: Fetch upstream models.json
        id: upstream
        run: |
          curl -fsSL \
            "https://api.github.com/repos/openai/codex/contents/${MODELS_JSON_PATH}" \
            -o upstream.json

          jq -e '
            .type == "file"
            and (.encoding == "base64")
            and (.content | type == "string")
            and (.sha | type == "string")
          ' upstream.json > /dev/null

          jq -r '.content' upstream.json | base64 -d > upstream-models.json

          upstream_sha="$(jq -r '.sha' < upstream.json)"
          upstream_short_sha="${upstream_sha:0:12}"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "upstream_short_sha=${upstream_short_sha}" >> "$GITHUB_OUTPUT"

      - name: Compare with local
        id: diff
        run: |
          if cmp -s upstream-models.json "${MODELS_JSON_PATH}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate JSON
        if: steps.diff.outputs.changed == 'true'
        run: jq '.' upstream-models.json > /dev/null

      - name: Generate PR body
        if: steps.diff.outputs.changed == 'true'
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.upstream_sha }}
        run: |
          {
            echo 'Automated sync from upstream.'
            echo
            echo "Upstream SHA: ${UPSTREAM_SHA}"
            echo
            echo 'Source:'
            echo "https://github.com/openai/codex/blob/main/${MODELS_JSON_PATH}"
            echo
            echo '### Diff'
            echo '```diff'
            diff -u "${MODELS_JSON_PATH}" upstream-models.json || true
            echo '```'
          } > summary.md

      - name: Upload sync payload
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sync-models-json-update
          path: |
            upstream-models.json
            summary.md
          if-no-files-found: error

  create_pr:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      MODELS_JSON_PATH: codex-rs/models-manager/models.json

    steps:
      - uses: actions/checkout@v6

      - name: Download sync payload
        uses: actions/download-artifact@v8
        with:
          name: sync-models-json-update
          path: sync-models-json-update

      - name: Update file
        run: mv sync-models-json-update/upstream-models.json "${MODELS_JSON_PATH}"

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/sync-models-json-${{ needs.check.outputs.upstream_short_sha }}
          delete-branch: true
          commit-message: "Sync models.json from upstream"
          title: "Sync models.json from openai/codex"
          body-path: sync-models-json-update/summary.md
