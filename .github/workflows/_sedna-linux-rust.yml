name: _sedna-linux-rust

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      summary_title:
        required: true
        type: string
      lane_id:
        required: false
        type: string
        default: ""
      lane_phase:
        required: false
        type: string
        default: downstream_lanes
      run_command:
        required: true
        type: string
      artifact_name:
        required: false
        type: string
        default: ""
      artifact_path:
        required: false
        type: string
        default: ""
      release_version:
        required: false
        type: string
        default: ""
      install_nextest:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  run:
    name: ${{ inputs.summary_title }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: 10G
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Check out workflow helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}
          path: .workflow-src

      - name: Set up Node.js for js_repl tests
        uses: actions/setup-node@v6
        with:
          node-version-file: codex-rs/node-version.txt

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install DotSlash
        uses: facebook/install-dotslash@v2

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Compute lockfile hash
        id: lockhash
        shell: bash
        run: |
          set -euo pipefail
          echo "hash=$(sha256sum Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$(sha256sum rust-toolchain.toml | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Install sccache
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2
        with:
          tool: sccache

      - name: Configure sccache backend
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "Using sccache GitHub backend"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
            echo "Using sccache local disk + actions/cache fallback"
          fi

      - name: Enable sccache wrapper
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ env.SCCACHE_GHA_ENABLED != 'true' }}
        id: cache_sccache_restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-${{ github.run_id }}
          restore-keys: |
            sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-
            sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2
        if: ${{ inputs.install_nextest }}
        with:
          tool: nextest
          version: 0.9.103

      - name: Install just
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2
        with:
          tool: just

      - name: Enable unprivileged user namespaces (Linux)
        if: ${{ inputs.install_nextest }}
        shell: bash
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          if sudo sysctl -a 2>/dev/null | grep -q '^kernel.apparmor_restrict_unprivileged_userns'; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Run requested command
        id: run_lane
        shell: bash
        continue-on-error: true
        env:
          LANE_COMMAND: ${{ inputs.run_command }}
        run: |
          set -euo pipefail
          command_file="${RUNNER_TEMP}/sedna-lane-command.sh"
          log_file="${RUNNER_TEMP}/sedna-lane.log"
          started_at_ms="$(date +%s%3N)"
          export CODEX_RELEASE_REPOSITORY='${{ github.repository }}'
          export CODEX_RELEASE_TAG_PREFIX='v'
          if [[ -n '${{ inputs.release_version }}' ]]; then
            export CODEX_RELEASE_VERSION='${{ inputs.release_version }}'
          fi
          printf '%s\n' 'set -euo pipefail' > "${command_file}"
          printf '%s\n' "${LANE_COMMAND}" >> "${command_file}"
          set +e
          bash "${command_file}" 2>&1 | tee "${log_file}"
          exit_code=${PIPESTATUS[0]}
          set -e
          finished_at_ms="$(date +%s%3N)"
          duration_ms="$((finished_at_ms - started_at_ms))"
          if [[ "${duration_ms}" -lt 0 ]]; then
            duration_ms=0
          fi
          {
            echo "command_file=${command_file}"
            echo "log_file=${log_file}"
            echo "started_at_ms=${started_at_ms}"
            echo "finished_at_ms=${finished_at_ms}"
            echo "duration_ms=${duration_ms}"
            echo "exit_code=${exit_code}"
          } >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Summarize lane failure output
        if: ${{ steps.run_lane.outcome == 'failure' }}
        shell: bash
        env:
          LANE_COMMAND: ${{ inputs.run_command }}
        run: |
          set -euo pipefail
          lane='${{ inputs.lane_id != '' && inputs.lane_id || inputs.summary_title }}'
          exit_code='${{ steps.run_lane.outputs.exit_code }}'
          log_file='${{ steps.run_lane.outputs.log_file }}'

          {
            echo "### Downstream lane failed: ${lane}"
            echo
            echo "- Exit code: ${exit_code}"
            echo "- Command:"
            echo '```bash'
            printf '%s\n' "${LANE_COMMAND}"
            echo '```'
            echo
            echo "#### Tail (last 120 lines)"
            echo '```text'
            tail -n 120 "${log_file}" || true
            echo '```'
            echo
            echo "#### Error-like lines"
            echo '```text'
            grep -En -m 60 "(^error:|^thread '.*' panicked|\\bFAILED\\b|failures:|error\\[|panic\\b)" "${log_file}" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error title=Downstream lane failed::${lane} failed (exit ${exit_code}). See step summary for command, tail, and error lines."

      - name: Verify requested command passed
        if: ${{ steps.run_lane.outcome == 'failure' }}
        shell: bash
        run: exit 1

      - name: Prepare lane summary artifact
        if: ${{ always() }}
        id: lane_summary
        shell: bash
        env:
          LANE_COMMAND: ${{ inputs.run_command }}
          SUMMARY_TITLE: ${{ inputs.summary_title }}
          LANE_ID: ${{ inputs.lane_id != '' && inputs.lane_id || inputs.summary_title }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          LANE_PHASE: ${{ inputs.lane_phase }}
          RUN_OUTCOME: ${{ steps.run_lane.outcome }}
          EXIT_CODE: ${{ steps.run_lane.outputs.exit_code }}
          LOG_FILE: ${{ steps.run_lane.outputs.log_file }}
          STARTED_AT_MS: ${{ steps.run_lane.outputs.started_at_ms }}
          FINISHED_AT_MS: ${{ steps.run_lane.outputs.finished_at_ms }}
          DURATION_MS: ${{ steps.run_lane.outputs.duration_ms }}
        run: |
          set -euo pipefail
          lane_slug="$(printf '%s' "${LANE_ID}" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]' '-' | sed 's/^-//;s/-$//' | cut -c1-48)"
          if [[ -z "${lane_slug}" ]]; then
            lane_slug="validation-lane"
          fi
          summary_file="${RUNNER_TEMP}/validation-lane-summary-${lane_slug}.json"
          python3 ../.workflow-src/.github/scripts/write_lane_summary.py \
            --lane-id "${LANE_ID}" \
            --lane-phase "${LANE_PHASE}" \
            --summary-title "${SUMMARY_TITLE}" \
            --run-command "${LANE_COMMAND}" \
            --outcome "${RUN_OUTCOME}" \
            --exit-code "${EXIT_CODE}" \
            --log-file "${LOG_FILE}" \
            --started-at-ms "${STARTED_AT_MS}" \
            --finished-at-ms "${FINISHED_AT_MS}" \
            --duration-ms "${DURATION_MS}" \
            --artifact-name "${ARTIFACT_NAME}" \
            --output "${summary_file}"
          echo "lane_slug=${lane_slug}" >> "$GITHUB_OUTPUT"
          echo "summary_file=${summary_file}" >> "$GITHUB_OUTPUT"

      - name: Upload lane summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-lane-summary-${{ steps.lane_summary.outputs.lane_slug }}
          path: ${{ steps.lane_summary.outputs.summary_file }}
          overwrite: true
          retention-days: 3

      - name: Upload workflow artifacts
        if: ${{ inputs.artifact_name != '' && inputs.artifact_path != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 3

      - name: Save cargo home cache
        if: ${{ always() && !cancelled() && steps.cache_cargo_home_restore.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: sccache-linux-rust-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}-${{ github.run_id }}

      - name: sccache stats
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: sccache --show-stats || true

      - name: sccache summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### sccache stats";
            echo;
            echo '```';
            sccache --show-stats || true;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
