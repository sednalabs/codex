interface:
  display_name: "Workflow Run Babysitter"
  short_description: "Watch GitHub Actions workflow runs and summarize failures"
  default_prompt: "Babysit a GitHub Actions workflow run through the bundled launcher script: monitor a validation-lab, sedna-heavy-tests, sedna-branch-build, or other GitHub workflow run by exact run id or by workflow plus ref. Prefer `scripts/gh_workflow_run_watch` so the launcher can find Python even when `python3` is not already on PATH; if a repo-specific Python is needed, set `GH_WORKFLOW_RUN_WATCH_PYTHON` to its absolute path. Use `--watch-until-action` when blocking on a cheap sidecar wait and `--watch` only for active foreground JSONL consumption. When many Actions runs are pending, use repeated `--target` specs in one invocation and let the helper return aggregate state once policy is met (`--wait-for first_action` default or `--wait-for all_done`). Keep exactly one watcher session active for the seam, let the helper follow the newest matching run when watching by workflow plus ref, and expect it to follow the resolved run directly between slower rediscovery passes. Return only on terminal success, actionable failure, or a blocker that needs the parent. The watcher is stdlib-only at runtime, so do not add Python package install steps; if a failure occurs and Gemini is enabled, expect `gemini_diagnosis`, `gemini_telemetry`, `diagnostic_evidence`, `validation_context`, and `diagnosis_status` instead of raw log spelunking. For validation-lab runs, prefer the watcher's mode-aware output over manual artifact parsing: `targeted` should surface one blocking seam, `frontier` should surface independent blockers from `validation-summary` when present, and checkpoint-like runs should avoid pretending broad failures are independent. Do not invent raw GitHub polling loops."
