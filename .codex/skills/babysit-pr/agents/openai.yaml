interface:
  display_name: "PR Babysitter"
  short_description: "Watch PR CI, reviews, and merge conflicts"
  default_prompt: "Babysit the current PR: monitor CI, reviewer comments, and merge-conflict status; fix valid issues, push updates, and rerun flaky failures up to 3 times. When you will block on a terminal wait, prefer the watcher’s --watch-until-action mode so the process exits on actionable or terminal PR state; use --watch only for active foreground JSONL consumption. Keep exactly one watcher session active for the PR (do not leave duplicate watcher terminals running). If you pause monitoring to patch review/CI feedback, restart the same watcher mode yourself immediately after the push in the same turn. If a foreground watcher is still running and no strict stop condition has been reached, the task is still in progress: keep consuming watcher output and sending progress updates instead of ending the turn. Continue polling autonomously after any push/rerun until a strict terminal stop condition is reached or the user interrupts."
